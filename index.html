function DealScreenerPage({setPage}) {
  const [propType, setPropType] = useState('restaurant');
  const defaults = PROPERTY_TYPES.find(p=>p.id===propType).defaults;
  const [d, setD] = useState({...defaults});
  const set = (k,v) => setD(prev => ({...prev, [k]: typeof v === 'string' ? v : Number(v)||0}));

  // Reset to defaults when property type changes
  useEffect(() => {
    const pt = PROPERTY_TYPES.find(p=>p.id===propType);
    setD({...pt.defaults});
  }, [propType]);

  const applyPreset = (preset) => {
    setD(prev => ({...prev, ...preset}));
  };

  const isRestaurant = propType === 'restaurant';

  // ── Calculations ──
  const totalProjectCost = d.purchasePrice + d.renovationBudget;
  const softCosts = Math.round(d.renovationBudget * 0.20);
  const contingency = Math.round(d.renovationBudget * 0.08);
  const totalDevelopmentCost = totalProjectCost + softCosts + contingency;

  // Income — from the real estate investor/landlord perspective
  let annualGrossIncome, annualOpex, noi;
  if (isRestaurant) {
    // Landlord's view: rent = occupancy cost the restaurant pays as a % of project cost
    const impliedAnnualRent = totalDevelopmentCost * (d.occupancyCostPct / 100);
    annualGrossIncome = impliedAnnualRent;
    annualOpex = impliedAnnualRent * 0.15; // NNN lease — minimal landlord expenses
    noi = annualGrossIncome - annualOpex;
  } else {
    const grossRent = d.monthlyRent * 12;
    const vacancyLoss = grossRent * (d.vacancyPct / 100);
    annualGrossIncome = grossRent - vacancyLoss;
    const mgmtCost = annualGrossIncome * (d.mgmtFeePct / 100);
    annualOpex = d.annualOpex > 0 ? (d.annualOpex + mgmtCost) : (annualGrossIncome * (d.opexRatio / 100) + mgmtCost);
    noi = annualGrossIncome - annualOpex;
  }

  // Debt
  const loanAmount = totalDevelopmentCost * (d.loanLTV / 100);
  const equityRequired = totalDevelopmentCost - loanAmount;
  const monthlyRate = (d.loanRate / 100) / 12;
  const nPeriods = d.loanTermYrs * 12;
  const monthlyPayment = monthlyRate > 0 ? pmt(monthlyRate, nPeriods, loanAmount) : loanAmount / nPeriods;
  const annualDebtService = monthlyPayment * 12;

  // Key Metrics
  const dscr = annualDebtService > 0 ? noi / annualDebtService : Infinity;
  const capRate = totalDevelopmentCost > 0 ? (noi / totalDevelopmentCost) * 100 : 0;
  const cashFlow = noi - annualDebtService;
  const cashOnCash = equityRequired > 0 ? (cashFlow / equityRequired) * 100 : 0;
  const breakEvenOccupancy = annualDebtService > 0 && !isRestaurant ? ((annualOpex + annualDebtService) / (d.monthlyRent * 12)) * 100 : 0;
  const rentPerSF = !isRestaurant && d.sqft > 0 ? (d.monthlyRent * 12) / d.sqft : 0;
  const costPerSF = d.sqft > 0 ? totalDevelopmentCost / d.sqft : 0;
  const buildOutPerSF = d.sqft > 0 ? d.renovationBudget / d.sqft : 0;

  // Restaurant-specific
  const occupancyCostActual = isRestaurant && d.annualRevenue > 0 ? (annualGrossIncome / d.annualRevenue) * 100 : 0;

  // ── Deal Health Score (0-100) ──
  let score = 50; // start neutral
  const flags = [];

  // DSCR scoring
  if (dscr >= 1.4) { score += 15; flags.push({c:'green',t:'Strong debt coverage (DSCR ' + dscr.toFixed(2) + 'x)'}); }
  else if (dscr >= 1.25) { score += 10; flags.push({c:'green',t:'Adequate debt coverage (DSCR ' + dscr.toFixed(2) + 'x)'}); }
  else if (dscr >= 1.1) { score += 0; flags.push({c:'yellow',t:'Thin debt coverage (DSCR ' + dscr.toFixed(2) + 'x) — most lenders want 1.25x+'}); }
  else if (dscr >= 1.0) { score -= 10; flags.push({c:'yellow',t:'Marginal DSCR (' + dscr.toFixed(2) + 'x) — barely covering debt service'}); }
  else { score -= 20; flags.push({c:'red',t:'Negative cash flow — NOI does not cover debt service (DSCR ' + dscr.toFixed(2) + 'x)'}); }

  // Cap rate scoring
  if (capRate >= 9) { score += 10; flags.push({c:'green',t:'Strong cap rate (' + capRate.toFixed(1) + '%) — good income yield'}); }
  else if (capRate >= 7) { score += 5; flags.push({c:'green',t:'Market cap rate (' + capRate.toFixed(1) + '%) — in line with Erie commercial'}); }
  else if (capRate >= 5) { score -= 5; flags.push({c:'yellow',t:'Below-market cap rate (' + capRate.toFixed(1) + '%) — verify rent assumptions'}); }
  else { score -= 15; flags.push({c:'red',t:'Very low cap rate (' + capRate.toFixed(1) + '%) — income too low relative to cost'}); }

  // Cash-on-cash scoring
  if (cashOnCash >= 12) { score += 10; flags.push({c:'green',t:'Excellent cash-on-cash return (' + cashOnCash.toFixed(1) + '%)'}); }
  else if (cashOnCash >= 8) { score += 5; flags.push({c:'green',t:'Good cash-on-cash return (' + cashOnCash.toFixed(1) + '%)'}); }
  else if (cashOnCash >= 4) { score -= 0; flags.push({c:'yellow',t:'Modest cash-on-cash return (' + cashOnCash.toFixed(1) + '%)'}); }
  else { score -= 10; flags.push({c:'red',t:'Low cash-on-cash return (' + cashOnCash.toFixed(1) + '%) — equity working too hard'}); }

  // Break-even occupancy (non-restaurant)
  if (!isRestaurant && breakEvenOccupancy > 0) {
    if (breakEvenOccupancy <= 70) { score += 5; flags.push({c:'green',t:'Low break-even occupancy (' + breakEvenOccupancy.toFixed(0) + '%) — good downside protection'}); }
    else if (breakEvenOccupancy <= 85) { score += 0; flags.push({c:'yellow',t:'Break-even occupancy at ' + breakEvenOccupancy.toFixed(0) + '% — moderate cushion'}); }
    else { score -= 10; flags.push({c:'red',t:'High break-even occupancy (' + breakEvenOccupancy.toFixed(0) + '%) — very little margin for vacancy'}); }
  }

  // Restaurant-specific flags
  if (isRestaurant) {
    if (d.occupancyCostPct <= 8) { score += 5; flags.push({c:'green',t:'Occupancy cost ratio (' + d.occupancyCostPct + '%) within healthy range for food service'}); }
    else if (d.occupancyCostPct <= 10) { score += 0; flags.push({c:'yellow',t:'Occupancy cost at ' + d.occupancyCostPct + '% — approaching upper limit for restaurants'}); }
    else { score -= 10; flags.push({c:'red',t:'Occupancy cost (' + d.occupancyCostPct + '%) too high — restaurants typically need under 10%'}); }

    if (d.buildOutPerSF > 0 && buildOutPerSF > 150) { flags.push({c:'yellow',t:'Build-out at ' + fmt(buildOutPerSF) + '/SF — verify kitchen scope is right-sized'}); }
    if (d.annualRevenue > 0 && d.sqft > 0 && d.annualRevenue / d.sqft < 200) { score -= 5; flags.push({c:'yellow',t:'Revenue/SF (' + fmt(Math.round(d.annualRevenue/d.sqft)) + ') below typical — verify concept viability'}); }
    else if (d.annualRevenue > 0 && d.sqft > 0 && d.annualRevenue / d.sqft >= 300) { score += 5; flags.push({c:'green',t:'Strong revenue density (' + fmt(Math.round(d.annualRevenue/d.sqft)) + '/SF)'}); }
  }

  // Cost per SF check
  if (costPerSF > 0 && costPerSF > 250) { flags.push({c:'yellow',t:'Total cost at ' + fmt(Math.round(costPerSF)) + '/SF — high for Erie market. Verify scope.'}); }
  if (costPerSF > 0 && costPerSF > 350) { score -= 5; }

  // Equity requirement check
  const equityPctActual = totalDevelopmentCost > 0 ? (equityRequired / totalDevelopmentCost) * 100 : 0;
  if (equityPctActual > 30) { flags.push({c:'yellow',t:'Equity requirement (' + equityPctActual.toFixed(0) + '%) is high — explore incentives to reduce gap'}); }

  score = Math.max(0, Math.min(100, score));

  const scoreColor = score >= 70 ? '#16A34A' : score >= 45 ? '#EAB308' : '#EF4444';
  const scoreVerdict = score >= 70 ? 'go' : score >= 45 ? 'maybe' : 'no';
  const verdictText = score >= 70 ? 'Deal Looks Promising — Worth Pursuing' : score >= 45 ? 'Needs Work — Adjust Assumptions or Add Incentives' : 'Does Not Pencil — Rethink Structure';

  // Incentive matching
  const matchedIncentives = [];
  matchedIncentives.push({name:'LERTA (Property Tax Abatement)', note:'Abates improvement value — improves NOI and DSCR'});
  matchedIncentives.push({name:'CRIZ (Tax Revenue Capture)', note:'Captures new state/local tax revenue for project support'});
  if (totalDevelopmentCost >= 500000) matchedIncentives.push({name:'RACP (State Grant)', note:'Gap financing — requires legislative sponsor and 1:1 match'});
  matchedIncentives.push({name:'Federal Historic Tax Credit', note:'20% credit on rehab costs if in National Register district'});
  matchedIncentives.push({name:'PA Historic Tax Credit', note:'Additional 25% credit — combined 45% with federal HTC'});
  if (totalDevelopmentCost >= 5000000) matchedIncentives.push({name:'New Markets Tax Credits', note:'20-25% of project cost as soft equity via CDE'});
  matchedIncentives.push({name:'Opportunity Zone', note:'Capital gains deferral/exclusion — attracts outside equity'});
  if (propType === 'multifamily') matchedIncentives.push({name:'LIHTC', note:'9% or 4% credit for affordable housing component'});
  matchedIncentives.push({name:'SBA 504', note:'Below-market fixed-rate financing for owner-occupied'});
  matchedIncentives.push({name:'CDBG', note:'Gap grants for projects benefiting LMI residents'});
  matchedIncentives.push({name:'KOZ', note:'Nearly all state/local taxes eliminated in designated zones'});

  // Score ring SVG math
  const circumference = 2 * Math.PI * 54;
  const offset = circumference - (score / 100) * circumference;

  return (
    <div>
      <div className="page-header">
        <div className="page-header-inner">
          <div className="back-link" onClick={() => setPage('home')}><Icon type="back" size={16}/> Home</div>
          <h1>Deal Screener</h1>
          <p>Quick-screen any deal in 60 seconds — get a go/no-go signal with key metrics</p>
        </div>
      </div>
      <div className="content">
        {/* Property Type Selection */}
        <div className="screener-type-grid">
          {PROPERTY_TYPES.map(pt => (
            <div key={pt.id} className={`screener-type-btn${propType === pt.id ? ' active' : ''}`} onClick={() => setPropType(pt.id)}>
              <span className="screener-type-icon">{pt.icon}</span>
              {pt.label}
            </div>
          ))}
        </div>

        {/* Presets */}
        {PRESETS[propType] && (
          <div className="preset-row">
            <span style={{fontSize:'0.72rem',color:'var(--text-muted)',alignSelf:'center',marginRight:'0.25rem'}}>Quick fill:</span>
            {PRESETS[propType].map((p,i) => (
              <button key={i} className="preset-btn" onClick={() => applyPreset(p)}>{p.label}</button>
            ))}
          </div>
        )}

        <div className="screener-layout">
          {/* LEFT: Inputs */}
          <div className="screener-inputs">
            <div className="screener-section">
              <h3>Acquisition & Construction</h3>
              <div className="screener-row">
                <NumInput label="Purchase Price" value={d.purchasePrice} onChange={v=>set('purchasePrice',v)} prefix="$" step={25000}/>
                <NumInput label="Renovation Budget" value={d.renovationBudget} onChange={v=>set('renovationBudget',v)} prefix="$" step={25000}/>
              </div>
              <div className="screener-row" style={{marginTop:'0.5rem'}}>
                <NumInput label="Square Footage" value={d.sqft} onChange={v=>set('sqft',v)} prefix="" suffix=" SF" step={500}/>
                {isRestaurant && <NumInput label="Build-Out $/SF" value={d.buildOutPerSF} onChange={v=>set('buildOutPerSF',v)} prefix="$" suffix="/SF" step={5}/>}
              </div>
            </div>

            <div className="screener-section">
              <h3>{isRestaurant ? 'Revenue & Occupancy Cost' : 'Income'}</h3>
              {isRestaurant ? (
                <div className="screener-row">
                  <NumInput label="Annual Revenue" value={d.annualRevenue} onChange={v=>set('annualRevenue',v)} prefix="$" step={50000}/>
                  <NumInput label="Occupancy Cost %" value={d.occupancyCostPct} onChange={v=>set('occupancyCostPct',v)} suffix="%" step={0.5}/>
                </div>
              ) : (
                <>
                  <div className="screener-row">
                    <NumInput label="Total Monthly Rent" value={d.monthlyRent} onChange={v=>set('monthlyRent',v)} prefix="$" step={250} hint="Combined rent from all units"/>
                    <NumInput label="Vacancy Rate" value={d.vacancyPct} onChange={v=>set('vacancyPct',v)} suffix="%" step={1}/>
                  </div>
                  <div className="screener-row" style={{marginTop:'0.5rem'}}>
                    <NumInput label="Annual Operating Expenses" value={d.annualOpex} onChange={v=>set('annualOpex',v)} prefix="$" step={1000} hint="Leave at $0 to auto-estimate from OpEx ratio below"/>
                    <NumInput label="Management Fee" value={d.mgmtFeePct} onChange={v=>set('mgmtFeePct',v)} suffix="%" step={0.5} hint="% of gross income for property management"/>
                  </div>
                </>
              )}
            </div>

            <div className="screener-section">
              <h3>Financing</h3>
              <div className="screener-row">
                <NumInput label="Loan-to-Value %" value={d.loanLTV} onChange={v=>set('loanLTV',v)} suffix="%" step={5}/>
                <NumInput label="Interest Rate" value={d.loanRate} onChange={v=>set('loanRate',v)} suffix="%" step={0.25}/>
              </div>
              <div className="screener-row" style={{marginTop:'0.5rem'}}>
                <NumInput label="Loan Term (years)" value={d.loanTermYrs} onChange={v=>set('loanTermYrs',v)} suffix=" yrs" step={5}/>
              </div>
            </div>
          </div>

          {/* RIGHT: Results */}
          <div className="screener-results">
            <div className="screener-section">
              <div className="score-ring">
                <svg viewBox="0 0 120 120">
                  <circle className="score-ring-bg" cx="60" cy="60" r="54"/>
                  <circle className="score-ring-fill" cx="60" cy="60" r="54"
                    stroke={scoreColor}
                    strokeDasharray={circumference}
                    strokeDashoffset={offset}/>
                </svg>
                <div className="score-label">
                  <div className="score-number" style={{color:scoreColor}}>{score}</div>
                  <div className="score-subtitle">Deal Score</div>
                </div>
              </div>

              <div className={`screener-verdict verdict-${scoreVerdict}`}>{verdictText}</div>

              <div className="metric-grid">
                <div className="metric-tile">
                  <div className="metric-tile-label">Total Cost<InfoTip label="Total Cost"/></div>
                  <div className="metric-tile-value">{fmt(totalDevelopmentCost)}</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">NOI<InfoTip label="NOI"/></div>
                  <div className={`metric-tile-value ${noi > 0 ? 'green' : 'red'}`}>{fmt(noi)}</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">DSCR<InfoTip label="DSCR"/></div>
                  <div className={`metric-tile-value ${dscr >= 1.25 ? 'green' : dscr >= 1.0 ? 'yellow' : 'red'}`}>{dscr === Infinity ? '∞' : dscr.toFixed(2)}x</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Cap Rate<InfoTip label="Cap Rate"/></div>
                  <div className={`metric-tile-value ${capRate >= 7 ? 'green' : capRate >= 5 ? 'yellow' : 'red'}`}>{capRate.toFixed(1)}%</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Cash-on-Cash<InfoTip label="Cash-on-Cash"/></div>
                  <div className={`metric-tile-value ${cashOnCash >= 8 ? 'green' : cashOnCash >= 4 ? 'yellow' : 'red'}`}>{cashOnCash.toFixed(1)}%</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Annual Cash Flow<InfoTip label="Annual Cash Flow"/></div>
                  <div className={`metric-tile-value ${cashFlow > 0 ? 'green' : 'red'}`}>{fmt(cashFlow)}</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Equity Required<InfoTip label="Equity Required"/></div>
                  <div className="metric-tile-value">{fmt(equityRequired)}</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Cost / SF<InfoTip label="Cost / SF"/></div>
                  <div className="metric-tile-value">{fmt(Math.round(costPerSF))}</div>
                </div>
                {!isRestaurant && (
                  <div className="metric-tile">
                    <div className="metric-tile-label">Rent / SF<InfoTip label="Rent / SF"/></div>
                    <div className="metric-tile-value">{fmt(Math.round(rentPerSF))}/SF</div>
                  </div>
                )}
                {!isRestaurant && breakEvenOccupancy > 0 && (
                  <div className="metric-tile">
                    <div className="metric-tile-label">Break-Even Occ.<InfoTip label="Break-Even Occ."/></div>
                    <div className={`metric-tile-value ${breakEvenOccupancy <= 75 ? 'green' : breakEvenOccupancy <= 85 ? 'yellow' : 'red'}`}>{breakEvenOccupancy.toFixed(0)}%</div>
                  </div>
                )}
                <div className="metric-tile">
                  <div className="metric-tile-label">Debt Service<InfoTip label="Debt Service"/></div>
                  <div className="metric-tile-value">{fmt(annualDebtService)}/yr</div>
                </div>
                <div className="metric-tile">
                  <div className="metric-tile-label">Loan Amount<InfoTip label="Loan Amount"/></div>
                  <div className="metric-tile-value">{fmt(loanAmount)}</div>
                </div>
              </div>
            </div>

            {/* Flags */}
            <div className="screener-section" style={{marginTop:'0.75rem'}}>
              <h3>Deal Analysis</h3>
              <div className="flag-list">
                {flags.map((f,i) => (
                  <div key={i} className={`flag-item ${f.c}`}>
                    <span>{f.c === 'green' ? '✓' : f.c === 'yellow' ? '⚠' : '✗'}</span>
                    <span>{f.t}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Erie Incentive Matching */}
            <div className="screener-section" style={{marginTop:'0.75rem'}}>
              <h3>Erie Incentive Match</h3>
              <p style={{fontSize:'0.78rem',color:'var(--text-muted)',marginBottom:'0.5rem'}}>Programs that could apply to this deal in Erie, PA:</p>
              <div className="incentive-match-list">
                {matchedIncentives.map((inc,i) => (
                  <div key={i} className="incentive-match">
                    <span className="incentive-match-dot"/>
                    <div>
                      <div style={{fontWeight:600,fontSize:'0.8rem'}}>{inc.name}</div>
                      <div style={{fontSize:'0.72rem',color:'var(--text-muted)'}}>{inc.note}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:'0.75rem',textAlign:'center'}}>
                <button className="btn-outline btn-sm" onClick={() => setPage('incentives')} style={{fontSize:'0.75rem'}}>
                  <Icon type="flag" size={12}/> View All Incentive Details
                </button>
              </div>
            </div>

            {/* Next Steps */}
            <div className="screener-section" style={{marginTop:'0.75rem'}}>
              <h3>Next Steps</h3>
              <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
                <button className="btn-gold btn-sm" onClick={() => setPage('deal-memo')} style={{width:'100%',justifyContent:'center'}}>
                  <Icon type="layers" size={14}/> Build Full Deal Memo
                </button>
                <button className="btn-outline btn-sm" onClick={() => setPage('simulators')} style={{width:'100%',justifyContent:'center',fontSize:'0.8rem'}}>
                  <Icon type="grid" size={14}/> Run Detailed Simulations
                </button>
                <button className="btn-outline btn-sm" onClick={() => setPage('coach')} style={{width:'100%',justifyContent:'center',fontSize:'0.8rem'}}>
                  <Icon type="sparkle" size={14}/> Ask the AI Coach
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── AI COACH KNOWLEDGE BASE ─────────────────────────────────────────────────
const COACH_KB = [
  // ── INCENTIVE PROGRAMS ──
  {keys:['cdbg','community development block grant','block grant'],title:'Community Development Block Grant (CDBG)',text:"CDBG provides annual formula grants to entitled cities like Erie for community development activities. Funds can support housing rehabilitation, public infrastructure, economic development, and public facilities — but the key requirement is that projects must primarily benefit low- and moderate-income residents (51% LMI area benefit or direct beneficiary test).\n\nTypical eligible uses in Erie include facade improvements, streetscape, demolition, housing rehab, and small business assistance. Prevailing wage (Davis-Bacon) applies. Applications go through the City of Erie's CDBG office.\n\nKey steps: Confirm project is in a CDBG-eligible area, document 51% LMI benefit, submit to City of Erie, obtain HUD environmental review (NEPA), have a Davis-Bacon compliance plan, and plan for quarterly reporting.\n\nTip: CDBG is often best used as gap funding in a larger capital stack — it won't carry a project alone, but $200-500K of CDBG can fill a gap that makes senior debt work."},
  {keys:['htc','historic tax credit','historic rehab','nps part','national register','qualified rehabilitation'],title:'Historic Tax Credits (HTC)',text:"The Federal Historic Tax Credit equals 20% of Qualified Rehabilitation Expenditures (QRE) on certified historic structures. Pennsylvania adds a 25% state HTC (capped at $500K per project). Combined, that's up to 45% of eligible rehab costs returned as tax credit equity — one of the most powerful incentive combinations in the country.\n\nHow it works: A tax credit investor (typically a bank or syndicator) buys the credits at $0.85-0.95 per dollar. That equity is injected into the project at or near construction completion, replacing what would otherwise be developer equity or additional debt.\n\nProcess: Submit NPS Part 1 (property is historic), Part 2 (proposed work meets Secretary of Interior Standards), then Part 3 after completion. The 5-year recapture period means you must maintain historic character and ownership structure for 5 years.\n\nErie context: Downtown Erie has numerous National Register-eligible buildings. EDDC's portfolio is rich with HTC-eligible projects. The combined federal + PA credit can turn a financially marginal rehab into a viable deal.\n\nChecklist: Confirm NR listing or district status → Part 1 application → Part 2 with architectural plans → Document QRE → Secure investor LOI → Part 3 after construction → 5-year compliance."},
  {keys:['opportunity zone','oz','qoz','qualified opportunity','capital gains deferral','opportunity fund'],title:'Federal Opportunity Zones (OZ)',text:"Opportunity Zones provide powerful capital gains tax incentives for investing in designated census tracts. The program has three tiers of benefit:\n\n1. Deferral — Capital gains invested in a Qualified Opportunity Fund (QOF) within 180 days are deferred until 2026 (or earlier sale)\n2. Step-up — After 10+ years, ALL new gains from the OZ investment are tax-free\n3. Flexibility — QOFs can invest in real estate, operating businesses, or both\n\nStructure: Establish a QOF (typically an LLC), deploy 90% of assets into Qualified OZ Property within 180 days of the election, file IRS Form 8996 annually.\n\nErie has several designated QOZ tracts downtown and in surrounding neighborhoods. For existing buildings, you must 'substantially improve' the property — the improvement must exceed the adjusted basis of the building (not including land) within 30 months.\n\nWhy it matters: OZ capital is patient equity — investors are incentivized to hold 10+ years, which aligns perfectly with long-term community development goals. It's powerful for attracting outside equity into Erie projects."},
  {keys:['lihtc','low income housing','housing tax credit','affordable housing','4% credit','9% credit','phfa'],title:'Low-Income Housing Tax Credits (LIHTC)',text:"LIHTC is the federal government's primary tool for creating affordable rental housing. There are two types:\n\n• 9% Credit — Competitive, allocated by state housing agencies (PHFA in PA). Covers roughly 70% of eligible project costs over 10 years. Extremely competitive — strong applications need community support, readiness, and experienced development teams.\n• 4% Credit — Non-competitive, paired with tax-exempt bonds. Covers roughly 30% of costs. Less subsidy but more predictable.\n\nHow it works: A tax credit syndicator/investor buys the credits (typically $0.85-0.93 per dollar), providing equity to the project. In return, developers commit to keeping rents affordable for 15 years (plus extended use period, often 30 years total).\n\nKey requirements: Income restrictions (typically 60% AMI), rent limits, market study, compliance monitoring, PHFA application during QAP cycle.\n\nErie context: Erie's lower construction costs and growing demand for quality affordable housing make LIHTC projects viable here. The key is pairing LIHTC with other sources — HTC if the building is historic, CDBG for infrastructure, LERTA for tax abatement to improve operating performance.\n\nChecklist: Market study → PHFA application → Site control → Plans & cost estimates → Identify syndicator → 15-year commitment + extended use agreement."},
  {keys:['nmtc','new markets','new market','cde','qalicb','qualified active low-income community business'],title:'New Markets Tax Credits (NMTC)',text:"NMTCs provide a 39% federal tax credit over 7 years (5% in years 1-3, 6% in years 4-7) on Qualified Equity Investments made through Community Development Entities (CDEs) in low-income communities.\n\nHow the leverage model works:\n1. A CDE receives an NMTC allocation from the CDFI Fund\n2. An investor makes a Qualified Equity Investment in the CDE\n3. The CDE loans the money (QLICI loan) to a Qualified Active Low-Income Community Business (QALICB) — that's usually the project entity\n4. The investor receives 39% in tax credits over 7 years\n5. The leverage structure can generate 20-25% of total project cost as soft equity\n\nBest for projects $5M+ because transaction costs are high ($300-500K in legal and accounting). Most of downtown Erie qualifies as a low-income census tract.\n\nKey compliance: 7-year compliance period, QALICB must maintain operations and meet community impact metrics. At year 7, the leverage loan is typically forgiven (the 'put/call' structure), converting it to permanent equity.\n\nLayering tip: NMTC + HTC is one of the most powerful combinations available. The NMTC leverage loan can cover the gap between HTC equity and senior debt, essentially double-dipping on federal incentives (legally, with proper structuring)."},
  {keys:['lerta','local economic revitalization','tax abatement','property tax relief','property tax abatement'],title:'LERTA (Local Economic Revitalization Tax Assistance)',text:"LERTA provides property tax abatement on the INCREASED assessed value from improvements in Erie. The abatement typically follows a declining 10-year schedule — for example, 100% abatement on the improvement value in Year 1, declining by 10% per year until full taxation in Year 11.\n\nCritical details:\n• Only the improvement value is abated — you still pay taxes on the base (pre-improvement) assessed value\n• You MUST apply before beginning construction\n• Requires approval from all three taxing bodies (City, County, School District)\n• Erie has been generally supportive of LERTA for qualifying projects\n\nWhy it matters financially: LERTA doesn't generate cash like a grant, but it dramatically improves operating performance. Lower property tax burden → higher NOI → better DSCR → more debt capacity. A LERTA abatement can be the difference between a 1.05x DSCR (unfinanceable) and a 1.35x DSCR (attractive to lenders).\n\nIn your pro forma, model the LERTA schedule explicitly — show the gradual tax increase over 10 years and make sure the project still pencils at full taxation. Lenders will want to see that.\n\nChecklist: Apply before construction → File with Erie County Assessment Office → Get all 3 taxing body approvals → Document pre-improvement value → Complete improvements → File for reassessment."},
  {keys:['criz','city revitalization','improvement zone','tax revenue capture'],title:'City Revitalization and Improvement Zone (CRIZ)',text:"CRIZ is one of Erie's most powerful incentives — and it's unique to Erie in Pennsylvania. The program captures nearly ALL new state and local tax revenue generated within the designated zone and returns it to fund development projects, infrastructure, and debt service.\n\nHow it works: When a new business opens or an existing one grows inside the CRIZ zone, the incremental state taxes (income, sales, corporate net income, etc.) and local taxes are captured by the CRIZ Authority. These revenues can then be used to:\n• Service project debt (bonding against future revenue)\n• Fund infrastructure improvements\n• Support project feasibility through direct grants\n\nErie's CRIZ zone covers key downtown and bayfront areas. For large projects that generate significant tax revenue (hotels, office buildings, mixed-use), CRIZ can be transformative because the captured revenue is an ongoing funding stream — not a one-time grant.\n\nKey considerations: The CRIZ Authority controls allocation, so projects must demonstrate community impact and job creation. Revenue projections must be realistic — the CRIZ only captures incremental (new) tax revenue, not existing. Financial feasibility studies are required.\n\nBest for: Large-scale projects ($5M+) with significant employment and sales tax generation. Retail, hospitality, and office generate the most capturable revenue."},
  {keys:['racp','redevelopment assistance','capital program','state grant','governor','legislative sponsor'],title:'Redevelopment Assistance Capital Program (RACP)',text:"RACP is Pennsylvania's largest discretionary grant program for economic development, cultural, and infrastructure projects. Grants can be substantial — $500K to $10M+ for qualifying projects.\n\nCritical requirement: You MUST have a state legislative sponsor. Your state senator or representative introduces the RACP request. Without political support, RACP is off the table — this is as much a political tool as a financial one.\n\nKey rules:\n• 1:1 match required with committed sources (not just pledges — actual commitments)\n• Prevailing wage (Davis-Bacon) applies\n• 3-year expenditure window — you must be ready to spend within 3 years of award\n• Environmental clearance required\n• Quarterly progress and expenditure reporting\n\nErie context: Erie projects have historically competed well for RACP because the region has strong legislative representation and clear community need. The key is having your deal structured, your match committed, and your legislative champion engaged well before the application cycle.\n\nProcess: Secure legislative sponsor → Document 1:1 match → Submit through Governor's Budget Office → Environmental clearance → Quarterly reporting.\n\nPro tip: RACP works best as gap financing in a larger stack. Don't build your entire deal around RACP — treat it as the piece that closes the gap after you've maximized debt, tax credits, and other sources."},
  {keys:['koz','keystone opportunity zone','tax exemption','tax free zone'],title:'Keystone Opportunity Zone (KOZ)',text:"Pennsylvania's Keystone Opportunity Zone program provides significant tax benefits to businesses locating in designated economically distressed areas. Benefits can include exemption from nearly all state and local taxes — corporate net income tax, capital stock/franchise tax, personal income tax, sales tax, and local business taxes.\n\nThis is effectively a tax-free zone for qualifying businesses during the active designation period.\n\nKey details:\n• Must file KOZ application with DCED before locating in the zone\n• Annual compliance reports required\n• Must maintain operations within the zone for the benefit period\n• Benefits vary by zone designation and remaining term\n\nErie context: Erie has KOZ-designated areas that can be powerful for attracting businesses — particularly when combined with other incentives like LERTA (property tax) and CRIZ (revenue capture). The triple play of KOZ + LERTA + CRIZ can make Erie's downtown one of the lowest-tax environments for new business in the Northeast.\n\nTip: Document the tax savings in your financial model — for a tenant, KOZ benefits can be worth $50-200K+ annually depending on revenue, which dramatically affects lease negotiations and tenant recruitment."},
  {keys:['sba','504','small business administration','sba 504','cdc debenture','owner occupied'],title:'SBA 504 Loan Program',text:"SBA 504 is a powerful financing tool for owner-occupied commercial real estate and major equipment purchases. The structure is:\n\n• 50% — Conventional bank first mortgage\n• 40% — CDC/SBA debenture at below-market fixed rate (20-25 year term)\n• 10% — Borrower equity (can be as low as 10%)\n\nThe SBA 504 debenture rate is typically 100-200 basis points below conventional rates, and it's FIXED for the full 20-25 year term. That predictability is valuable.\n\nKey requirements:\n• Must be owner-occupied (51%+ for existing buildings, 60%+ for new construction)\n• Apply through a Certified Development Company (CDC)\n• Must create or retain 1 job per $75K of SBA debenture\n• Maximum debenture: $5M ($5.5M for manufacturers and energy projects)\n\nErie context: SBA 504 is ideal for small to mid-size businesses buying their own building downtown. A restaurant buying a $500K building might structure it as $250K bank loan + $200K SBA 504 + $50K equity — with a 20-year fixed rate on the SBA piece.\n\nChecklist: Confirm owner-occupancy → Apply through CDC → Financial statements + tax returns → Personal financial statement → Property appraisal → Document job creation."},
  {keys:['eb-5','immigrant investor','foreign investor','eb5','targeted employment area'],title:'EB-5 Immigrant Investor Program',text:"EB-5 provides a path to permanent residency for foreign investors who invest $800,000+ in projects within Targeted Employment Areas (TEAs) that create at least 10 full-time jobs per investor.\n\nHow it works as project financing:\n• Foreign investors contribute $800K+ as equity into a qualifying project\n• The investment must create 10 direct or indirect full-time jobs per investor\n• Capital is 'patient' — investors are motivated by immigration benefit, not financial return\n• Typical project raises $5-20M from multiple investors\n\nStructure: Create an EB-5 fund (requires securities attorney and PPM), file I-526E petitions for each investor, demonstrate job creation through economic impact studies.\n\nErie context: Erie has TEA-designated areas, making it eligible for the lower $800K threshold. For larger projects ($10M+), EB-5 can provide a meaningful equity layer — and because the investors are primarily motivated by immigration benefits, the cost of capital is often lower than market-rate equity.\n\nTimeline consideration: Visa processing takes 18-36 months, so EB-5 is better suited for projects that can accommodate a longer capital formation timeline. Often used alongside bridge financing.\n\nChecklist: Confirm TEA designation → Engage EB-5 securities attorney → Prepare PPM → File I-526E per investor → Document 10 jobs per investor → Plan for 18-36 month timeline."},
  {keys:['eda','economic development administration','public works','economic adjustment'],title:'EDA Public Works & Economic Adjustment Grants',text:"The Economic Development Administration (EDA) provides grants for infrastructure, workforce development, and economic resilience projects in economically distressed communities. Erie qualifies as a distressed community on multiple metrics.\n\nTwo main programs:\n• Public Works — Infrastructure projects that support job creation and private investment\n• Economic Adjustment — Broader economic development activities, including planning, technical assistance, and revolving loan funds\n\nGrant amounts can be significant — $500K to $5M+ for larger infrastructure projects.\n\nKey requirements:\n• Must be in an economically distressed area (Erie qualifies)\n• Prepare a Comprehensive Economic Development Strategy (CEDS)\n• 20-50% local match required\n• Document job creation and economic impact\n• Davis-Bacon prevailing wage applies\n• Federal environmental review (NEPA)\n• Letters of support from elected officials\n\nErie context: EDA grants have historically been used for infrastructure supporting larger development projects — utilities, streetscape, parking structures, broadband. If your project needs public infrastructure improvements, EDA is a strong fit.\n\nTip: EDA applications score well when tied to a regional economic strategy and showing clear private investment leverage."},
  {keys:['epa','brownfield','brownfields','contamination','phase i','phase ii','environmental assessment','act 2'],title:'EPA Brownfields & Environmental Assessment',text:"Brownfield sites — properties with known or suspected contamination — are common in Erie's industrial heritage areas. EPA Brownfields grants help overcome the environmental liability barrier:\n\n• Assessment Grants — Up to $500K for Phase I and Phase II environmental assessments\n• Cleanup Grants — Up to $2M per site for actual remediation\n• Revolving Loan Fund grants — For communities to establish cleanup lending programs\n\nPhase I ESA identifies Recognized Environmental Conditions (RECs) — it's a desktop and site inspection study, typically $3-5K. Phase II involves actual sampling and testing — $15-50K+ depending on scope.\n\nPennsylvania's Act 2 program provides a streamlined cleanup framework with liability protection for developers who clean to approved standards. Three cleanup standards: Background, Statewide Health, and Site-Specific — each with different cost and flexibility profiles.\n\nErie context: Many former industrial sites in Erie qualify for brownfield assistance. The key is not to let environmental risk kill a deal — instead, use EPA assessment grants to define the scope, then factor cleanup costs into the capital stack. A $200K cleanup on a $5M project is manageable; an unknown liability is not.\n\nChecklist: Phase I ESA → Apply through City or Redevelopment Authority → Community involvement plan → QAPP → ABCA → Site-specific cleanup plan."},
  {keys:['tif','tax increment financing','tax increment','increment','public infrastructure'],title:'Tax Increment Financing (TIF)',text:"TIF captures the increase in property tax revenue generated by new development and redirects that 'increment' to finance public infrastructure improvements that support the project.\n\nHow it works:\n1. Establish a TIF district (requires municipal approval and public hearing)\n2. Freeze the base assessed value at the current level\n3. As new development increases property values, the tax increment flows to the TIF fund\n4. TIF revenues can service bonds or be paid directly for eligible infrastructure\n\nEligible uses: Streets, utilities, parking, streetscape, demolition, environmental remediation — essentially public infrastructure that enables private development.\n\nKey considerations:\n• Only captures the INCREMENT — base taxes continue flowing to normal taxing bodies\n• Requires municipal council approval and public hearing\n• Revenue projections must be realistic — if development doesn't materialize, TIF revenue doesn't either\n• Can be bonded (TIF bonds) for upfront capital, but bond sizing depends on revenue certainty\n\nErie context: TIF works best for larger projects or districts where new development generates significant property value increases. A single $2M renovation might not generate enough increment to justify TIF setup costs, but a $20M mixed-use project creating $300K+ in annual tax increment could support meaningful infrastructure bonds.\n\nPA's TIF Guarantee Program can also provide credit enhancement for TIF bonds."},
  {keys:['keystone communities','keystone community','facade','facade improvement','neighborhood'],title:'Keystone Communities Program',text:"Keystone Communities supports the revitalization of downtowns and neighborhoods through grants for facade improvements, building rehabilitation, code enforcement, and infrastructure.\n\nKey features:\n• Grants for facade improvements and building rehab in designated Keystone Communities\n• Requires 1:1 local match\n• Applications submitted to DCED during open rounds\n• Must include a defined scope, budget, and municipal support\n\nErie context: Erie is a designated Keystone Community, making projects in the downtown and eligible neighborhoods qualified. This is particularly useful for smaller-scale facade and streetscape projects — $50-250K grants that can leverage private investment for building improvements.\n\nBest for: Facade improvement programs, small building rehab, and streetscape projects where the public benefit is visible and the match is achievable."},
  {keys:['npp','neighborhood partnership','nonprofit','community development'],title:'Neighborhood Partnership Program (NPP)',text:"NPP incentivizes businesses to contribute to community development by providing tax credits for donations to approved nonprofit organizations working on neighborhood revitalization.\n\nStructure:\n• A business donates to an approved nonprofit's 5-year neighborhood plan\n• The business receives state tax credits equal to 75-80% of the donation\n• The nonprofit uses funds for community development activities defined in the plan\n\nKey requirements: Identify eligible nonprofit partner, develop a 5-year neighborhood plan, submit DCED application, secure business donor commitments, and file annual reports.\n\nErie context: NPP is useful for channeling corporate giving into targeted community development. It's less about individual project financing and more about sustained neighborhood investment — useful for housing, community facilities, and capacity building."},
  {keys:['pa first','pennsylvania first','pa first program'],title:'Pennsylvania First Program',text:"PA First provides flexible, customized financial assistance for economic development projects that create jobs and capital investment. The program can include grants, loans, and tax credits — structured based on the specific project and its economic impact.\n\nKey features:\n• Flexible terms — can be structured as grant, loan, or combination\n• Focused on job creation and retention\n• Requires business plan and financial projections\n• Contact DCED regional office for initial consultation\n\nBest for: Business attraction and retention projects where job creation is the primary selling point. The flexibility of the program means it can fill various roles in a capital stack."},
  {keys:['pida','industrial development authority','industrial development','low interest loan'],title:'Pennsylvania Industrial Development Authority (PIDA)',text:"PIDA offers low-interest loans through local Industrial Development Authorities for land and building acquisition, construction, and equipment.\n\nKey features:\n• Below-market interest rates\n• Long terms (up to 15-20 years for real estate)\n• Apply through your local IDA\n• Must document job creation commitment\n• Requires business financials, projections, appraisal, and environmental review\n\nErie context: PIDA loans can serve as subordinate financing in a capital stack — filling the gap between senior debt and owner equity at a rate lower than mezzanine or bridge financing. Particularly useful for manufacturing and industrial projects."},

  // ── FINANCE CONCEPTS ──
  {keys:['cap rate','capitalization rate'],title:'Cap Rate',text:"Cap Rate = Net Operating Income (NOI) / Property Value (or Purchase Price)\n\nA cap rate converts a property's income into a value estimate. A 10% cap rate on a property with $50K NOI implies a $500K value. In Erie, commercial cap rates typically range:\n\n• Office: 8-12% (higher = suburban/older, lower = downtown/newer)\n• Retail: 7-10% (location-dependent)\n• Industrial: 7-9% (stable tenants command lower caps)\n• Multifamily: 7-10% (depends on class and condition)\n\nKey insight: Lower cap rate = higher value but lower yield. When buying, you want a HIGH cap rate (buying income cheap). When selling, you want a LOW cap rate (your income is valued more).\n\nCompression vs. expansion: If market cap rates compress (decline) during your hold, your property appreciates even without NOI growth. If they expand (rise), you lose value even if NOI is stable. Always model exit cap rate 50-100 bps above entry.\n\nTry the Real Estate Deal Analyzer simulator to test different cap rate scenarios on your deals."},
  {keys:['noi','net operating income','effective gross income','operating expenses'],title:'Net Operating Income (NOI)',text:"NOI = Effective Gross Income − Operating Expenses\n\nThis is THE most important number in commercial real estate — it measures how much income a property generates before debt service and capital expenditures.\n\nBuilding blocks:\n• Potential Gross Income (PGI) = All rent if 100% occupied\n• − Vacancy & Credit Loss (typically 5-15% in Erie)\n• = Effective Gross Income (EGI)\n• − Operating Expenses (property tax, insurance, maintenance, management, utilities if included)\n• = NOI\n\nWhat NOI excludes: Debt service (mortgage payments), capital expenditures, depreciation, and income taxes. This is intentional — NOI measures property performance independent of how it's financed.\n\nWhy lenders care: NOI drives DSCR (debt coverage), which determines how much you can borrow. Every dollar of NOI improvement typically supports $10-15 of additional debt capacity.\n\nErie context: For a stabilized downtown office building, expect $12-18/SF gross rents, 10-15% vacancy, and $6-9/SF in operating expenses, yielding NOI of roughly $4-8/SF."},
  {keys:['dscr','debt service coverage','debt coverage','debt service'],title:'Debt Service Coverage Ratio (DSCR)',text:"DSCR = NOI / Annual Debt Service\n\nThis ratio tells lenders whether the property generates enough income to cover mortgage payments — and by how much.\n\n• 1.0x = Break even (NOI exactly covers debt service)\n• 1.20x = Minimum for most commercial lenders\n• 1.25x = Standard requirement for community banks in Erie\n• 1.40x+ = Strong — gives you negotiating leverage on rate and terms\n• Below 1.0x = Negative cash flow after debt service — deal doesn't work\n\nHow to use it: If your NOI is $100K and a lender requires 1.25x DSCR, your maximum annual debt service is $80K ($100K ÷ 1.25). Work backwards to determine maximum loan amount based on rate and term.\n\nImproving DSCR: Increase rents, reduce vacancy, lower operating costs (LERTA helps here!), or restructure debt (longer amortization, lower rate).\n\nErie market: Community banks in Erie typically want 1.20-1.30x. CDFIs may accept 1.10-1.15x for mission-aligned projects. SBA 504 loans improve DSCR because the below-market rate on the SBA piece reduces total debt service."},
  {keys:['capital stack','stack','senior debt','mezzanine','preferred equity','common equity','equity'],title:'Capital Stack',text:"The capital stack is the complete picture of how a project is financed, organized by risk and repayment priority from bottom to top:\n\n1. Senior Debt (bottom — paid first, lowest risk)\n   • Conventional first mortgage, typically 65-75% LTV\n   • Lowest interest rate because first lien position\n   • Erie community banks: 6-8% variable or fixed\n\n2. Mezzanine / Subordinate Debt (middle)\n   • Sits behind senior debt, higher rate (8-14%)\n   • CDFIs (Reinvestment Fund, Community First Fund) common in Erie\n   • SBA 504 debenture falls here at below-market rates\n\n3. Tax Credit Equity / Grant Funding\n   • HTC, NMTC, LIHTC investor equity\n   • RACP, CDBG, EDA grants\n   • This layer often makes Erie deals viable\n\n4. Preferred Equity (higher risk)\n   • Priority distributions before common equity\n   • OZ investors often come in at this level\n\n5. Common Equity (top — paid last, highest risk + highest upside)\n   • Developer/owner equity, typically 10-20% of TDC\n   • Last money in, first to lose, but captures all upside\n\nThe art of development finance is building a stack where each layer makes the next one possible. Try the Capital Stack Builder simulator to model your own stack."},
  {keys:['sources','uses','sources and uses','funding gap','total development cost','tdc'],title:'Sources & Uses',text:"Sources & Uses is the fundamental financial statement of any development project. Uses = everything the project costs. Sources = how you pay for it. They must balance.\n\nTypical Uses:\n• Land/Building Acquisition\n• Hard Costs (construction): 55-70% of TDC in Erie\n• Soft Costs (A&E, legal, permits, accounting): 15-25%\n• Financing Costs (interest, fees, reserves): 8-15%\n• Developer Fee: 5-15% (varies by program)\n• Contingency: 5-10% (always include this)\n\nTypical Sources (layered in this order):\n1. Senior Debt (sized by DSCR and LTV)\n2. Tax Credit Equity (HTC, NMTC, LIHTC)\n3. Public Grants (RACP, CDBG, EDA)\n4. Subordinate Debt (CDFI, SBA 504, PIDA)\n5. Owner Equity (last dollar in, 10-20% target)\n\nIf Sources < Uses, you have a FUNDING GAP. This is normal in the early stages — the work is finding the right combination of incentives and financing to close the gap.\n\nTry the Sources & Uses simulator, or build a complete deal package with the Deal Memo generator."},
  {keys:['waterfall','distribution','promote','carried interest','carry','preferred return','pref'],title:'Waterfall Distribution',text:"A waterfall determines how cash flow and profits are distributed among investors and sponsors. The typical structure:\n\n1. Return of Capital — investors get their original investment back first\n2. Preferred Return ('pref') — investors receive a priority return (typically 8-10% annually) before any profit split\n3. Catch-up / Promote — the sponsor (developer) receives a disproportionate share until they 'catch up' to their promoted interest\n4. Residual Split — remaining profits split pro-rata (e.g., 70/30 LP/GP or 80/20)\n\nWhy it matters: The waterfall structure determines who makes money and when. A generous preferred return attracts investors. A strong promote incentivizes the developer to maximize value.\n\nExample: On a $5M project with 30% LP equity ($1.5M), an 8% preferred return, and 20% GP promote — LPs receive their $1.5M back first, then 8%/year on unreturned capital, then the GP catches up, then profits split 80/20.\n\nTry the Capital Stack Builder simulator to model waterfall distributions on your deals."},
  {keys:['pro forma','projected','projection','financial model','year 1','stabilized','rent growth'],title:'Pro Forma',text:"A pro forma projects future financial performance of a real estate project. Every lender, investor, and incentive program will ask for one.\n\nKey components for real estate:\n• Revenue: Gross potential rent, vacancy, other income → Effective Gross Income\n• Expenses: Property tax, insurance, maintenance, management, utilities, reserves\n• NOI: EGI minus operating expenses\n• Debt Service: Annual mortgage payments\n• Cash Flow: NOI minus debt service\n• Reversion: Sale/exit value at end of hold period\n\nBest practices:\n• Use realistic Erie market rents, not aspirational numbers\n• Model 2-3% annual rent growth (conservative for Erie)\n• Show phased occupancy in Year 1 (75%) ramping to stabilization in Year 2-3 (90-95%)\n• Include a 5-10% vacancy factor even at stabilization\n• Always model sensitivity scenarios (base, downside, upside)\n\nKey metrics derived: NOI, DSCR, Cap Rate, Cash-on-Cash Return, IRR, Equity Multiple\n\nUse the Real Estate Deal Analyzer or Business Revenue Analyzer simulator to build your pro forma."},
  {keys:['irr','internal rate of return','annualized return','time value'],title:'Internal Rate of Return (IRR)',text:"IRR is the annualized return that accounts for the timing of all cash flows — both distributions during the hold period and the lump sum at exit. It's the gold standard for comparing real estate investments.\n\n• 8-12% IRR = Solid, conservative deal (core/stabilized)\n• 12-18% IRR = Strong value-add return\n• 18-25%+ IRR = High-performing opportunistic deal\n\nWhy IRR matters more than simple return: A project returning 50% over 10 years sounds okay, but that's only ~4.1% IRR. A project returning 50% over 3 years is ~14.5% IRR. Timing matters enormously.\n\nKey inputs: Initial equity investment, annual cash flows, exit/sale proceeds, and hold period length.\n\nIRR is sensitive to: Hold period length (shorter = higher IRR if proceeds are the same), timing of distributions, and exit cap rate assumptions.\n\nTry the Real Estate Deal Analyzer simulator — it calculates IRR using Newton's method across your projected hold period."},
  {keys:['cash on cash','cash-on-cash','coc','annual cash flow','equity invested'],title:'Cash-on-Cash Return',text:"Cash-on-Cash = Annual Cash Flow / Total Cash Invested\n\nThis measures the current yield on your actual cash investment — the simplest measure of how hard your equity is working.\n\nExample: You invest $200K equity in a deal that generates $20K/year in cash flow after debt service. Cash-on-Cash = 10%.\n\nErie market targets:\n• 6-8% = Acceptable for stabilized, low-risk properties\n• 8-12% = Good target for most Erie commercial deals\n• 12%+ = Strong — usually indicates value-add or below-market acquisition\n\nDifference from IRR: Cash-on-Cash only measures annual income return — it ignores property appreciation, principal paydown, and eventual sale proceeds. IRR captures all of these.\n\nBoth metrics matter: Cash-on-Cash tells you about today's yield; IRR tells you about total return over time."},
  {keys:['ltv','loan to value','loan-to-value','ltc','loan to cost','loan-to-cost'],title:'LTV & LTC Ratios',text:"LTV (Loan to Value) = Loan Amount / Property Value\nLTC (Loan to Cost) = Loan Amount / Total Development Cost\n\nBoth measure leverage, but they're used in different contexts:\n\n• LTV — used for stabilized properties (acquisitions, refinancing). Banks typically cap at 75-80% for commercial.\n• LTC — used for development/construction projects where cost may differ significantly from appraised value. Banks typically cap at 65-75%.\n\nWhy the distinction matters: A $5M project might cost $5M (TDC) but appraise at $6.5M upon completion. A 75% LTV loan = $4.875M, but a 70% LTC loan = $3.5M. The difference is significant.\n\nErie context: Community banks here generally use the more conservative of LTV or LTC. For HTC projects, the appraised value often exceeds cost (because tax credits add value), so LTV may be more favorable than LTC.\n\nRelated: Loan sizing is also constrained by DSCR — even if LTV math supports a $4M loan, if NOI only supports $3M of debt service, the lender will cap at $3M."},
  {keys:['vacancy','occupancy','phased','lease up','absorption'],title:'Vacancy & Occupancy',text:"Vacancy rate = percentage of rentable space that is unoccupied. It's one of the most important inputs in any pro forma.\n\nErie market ranges:\n• Downtown office: 10-15%\n• Retail: 8-12%\n• Industrial: 5-8%\n• Multifamily: 5-8% (strong demand)\n\nBest practice for underwriting:\n• Year 1: Model 25-40% vacancy (phased lease-up) for new/renovated projects\n• Year 2: 15-20% vacancy (absorption continues)\n• Year 3+: Stabilized at 5-10% depending on property type\n\nWhy conservative vacancy matters: Lenders stress-test your pro forma at higher vacancy. If your deal only works at 95% occupancy, it's too fragile. Model conservatively and let actual performance exceed projections.\n\nCredit loss: Budget 1-2% of gross rent for tenants who don't pay. This is separate from physical vacancy.\n\nTip: Use the Real Estate Deal Analyzer to model different vacancy scenarios and see how they affect DSCR, cash flow, and IRR."},
  {keys:['construction','hard cost','soft cost','contingency','value engineering','budget'],title:'Construction Costs & Budgeting',text:"Hard costs in Erie typically range $80-250/SF depending on scope:\n\n• Light renovation (cosmetic): $80-120/SF\n• Moderate rehab (systems + finishes): $120-180/SF\n• Heavy/historic rehab: $150-220/SF\n• New construction: $180-250/SF\n\nSoft costs add 15-25% on top of hard costs:\n• Architecture & Engineering: 6-10%\n• Legal & Accounting: 2-4%\n• Permits & Fees: 1-3%\n• Insurance during construction: 1-2%\n• Financing costs: 3-5%\n\nALWAYS include contingency: 5-10% of hard + soft costs. In historic rehab, go 10% — you will find surprises behind those walls.\n\nPrevailing wage impact: If using RACP, CDBG, EDA, or other government funding, Davis-Bacon prevailing wage requirements can add 10-20% to labor costs. Factor this into your budget from day one.\n\nValue engineering: If bids come in over budget, work with your architect and GC to identify savings. Target finishes and systems, not structural elements. The goal is maintaining quality while reducing cost — not cutting corners."},
  {keys:['lease','nnn','triple net','gross lease','tenant','rent','tenant recruitment'],title:'Lease Structures & Tenant Recruitment',text:"Common commercial lease structures:\n\n• NNN (Triple Net): Tenant pays base rent + property tax + insurance + maintenance. Landlord receives 'clean' income. Standard for retail and industrial.\n• Gross Lease: Tenant pays one all-inclusive rent. Landlord covers operating expenses. Common for office — simpler for tenants.\n• Modified Gross: Base rent with some expenses passed through (often utilities and janitorial). Hybrid approach.\n\nErie market rents:\n• Downtown office: $12-18/SF gross\n• Retail (street level): $10-16/SF NNN\n• Industrial: $4-8/SF NNN\n• Multifamily: $0.80-1.40/SF/month\n\nTenant recruitment strategy: Lead with the space (quality, location, build-out), but close with the incentives. A KOZ + LERTA + CRIZ combination can reduce a tenant's effective occupancy cost by 20-40% compared to a standard lease elsewhere.\n\nKey lease terms: Escalation rate (2-3% annual), tenant improvement allowance ($15-50/SF for office), lease term (5-10 years for credit tenants), and personal guarantee requirements."},
  {keys:['gap','gap financing','funding gap','close the gap','how to fund'],title:'Gap Financing',text:"A funding gap exists when your project's Total Development Cost exceeds the sum of all identified sources. This is completely normal in development finance — especially in markets like Erie where conventional debt alone rarely covers the full cost.\n\nStrategies to close the gap:\n\n1. Tax credit equity (HTC, NMTC, LIHTC) — Can cover 20-45% of eligible costs\n2. Public grants (RACP, CDBG, EDA) — Direct gap reduction\n3. CDFI / subordinate debt — Lower equity requirement\n4. LERTA / KOZ — Doesn't add cash, but improves NOI → more debt capacity\n5. TIF / CRIZ — Infrastructure funding or revenue capture\n6. Value engineering — Reduce costs without reducing quality\n7. Phasing — Split the project into fundable phases\n\nThe art: Layer these sources so each one makes the next possible. HTC equity reduces your debt need, which improves DSCR, which allows more senior debt, which reduces the equity requirement.\n\nUse the Deal Memo generator to build a complete Sources & Uses statement that shows exactly where your gap is — then use the Incentives page to identify which programs can fill it."},
  {keys:['phase','phasing','phased development','phase 1','multi-phase'],title:'Phased Development',text:"Phasing a project means breaking it into sequential stages, each of which can be independently financed and delivered. This is a powerful strategy when:\n\n• Total project cost exceeds available financing\n• You need to demonstrate market demand before committing to full build-out\n• Construction logistics require sequential completion\n• Different phases target different incentive programs\n\nExample: A $15M mixed-use project might phase as:\n• Phase 1 ($5M): Historic rehab of existing building using HTC + senior debt\n• Phase 2 ($4M): New construction addition using OZ equity + conventional financing\n• Phase 3 ($6M): Additional mixed-use space using NMTC + LIHTC\n\nBenefits: Each phase is a smaller, more manageable deal. Cash flow from Phase 1 can support Phase 2. Success demonstrates demand for lenders and investors.\n\nRisk: Phasing can increase total cost (multiple mobilizations, longer timeline). Plan carefully."},

  // ── ERIE-SPECIFIC ──
  {keys:['erie','erie pa','erie market','erie downtown','downtown erie','eddc'],title:'Erie, PA Market Overview',text:"Erie, PA (pop. ~95,000, metro ~270,000) is a Great Lakes city with a strong industrial heritage now in economic transition. Key market characteristics:\n\nStrengths:\n• Low construction costs relative to peer cities\n• Strong anchor institutions (UPMC Hamot, Penn State Behrend, Gannon, Mercyhurst, Erie Insurance)\n• Powerful incentive stack (CRIZ + LERTA + KOZ is nearly unmatched)\n• Bayfront development corridor with momentum\n• EDDC as a committed development catalyst downtown\n\nChallenges:\n• Population decline (though stabilizing in recent years)\n• Limited market-rate rent growth historically\n• Thin investment market (fewer comps, fewer buyers)\n• Weather perception affects talent attraction\n\nKey metrics:\n• Commercial cap rates: 7-12%\n• Office rents: $12-18/SF gross\n• Retail rents: $10-16/SF NNN\n• Construction hard costs: $80-250/SF\n• Vacancy: Office 10-15%, Retail 8-12%, Industrial 5-8%\n\nThe opportunity: Erie's low basis and powerful incentive stack mean that well-structured deals can generate strong returns that would be impossible in higher-cost markets. The key is underwriting conservatively and layering incentives strategically."},
  {keys:['prevailing wage','davis-bacon','davis bacon','wage requirement','labor cost'],title:'Prevailing Wage / Davis-Bacon',text:"Several federal and state funding sources trigger prevailing wage (Davis-Bacon) requirements, which mandate paying construction workers the locally prevailing wage rate for their trade.\n\nPrograms that trigger prevailing wage:\n• CDBG (federal)\n• RACP (state)\n• EDA grants (federal)\n• Any project using federal funds generally\n\nImpact on budget: In Erie, prevailing wage can add 10-20% to labor costs compared to open-shop rates. For a $3M hard cost project, that could mean $300-600K in additional cost.\n\nPlanning tip: Factor prevailing wage into your budget from day one if using any government funding. Don't discover this requirement after bids come in. Some developers structure their capital stacks to avoid prevailing wage triggers when the cost impact exceeds the funding benefit.\n\nKey question: 'Is the grant worth more than the prevailing wage premium?' For a $500K RACP grant that triggers $300K in additional labor cost, the net benefit is only $200K — still worth it, but the analysis matters."},
  {keys:['deal screener','screen','quick screen','does this deal work','run the numbers','pencil','will it work','analyze deal','evaluate'],title:'Deal Screener',text:"The Deal Screener is Keystone Stack's quick-evaluation tool. Enter a few key numbers — purchase price, renovation budget, rent, and financing terms — and get an instant Deal Health Score (0-100) with a go/no-go signal.\n\nIt supports 5 property types: Restaurant, Retail, Office, Multifamily, and Mixed-Use. Each type has tailored benchmarks and presets so you can quick-fill realistic numbers.\n\nWhat it calculates:\n• Total Development Cost (with soft costs + contingency auto-calculated)\n• NOI, DSCR, Cap Rate, Cash-on-Cash Return\n• Annual Cash Flow, Break-Even Occupancy\n• Equity Required, Cost per SF, Debt Service\n\nIt also flags deal strengths and weaknesses — green flags for strong metrics, yellow for caution areas, red for deal-breakers. And it automatically matches your deal to Erie incentive programs that could improve the numbers.\n\nThe Deal Screener is the entry point: Screen → Model → Package → Present to lenders. Try it from the nav bar or homepage."},
  {keys:['help','what can you','how do','what do you know','topics','what should i ask'],title:'How I Can Help',text:"I'm the Keystone Stack AI Business Coach. I have deep knowledge of development finance, incentive programs, and deal structuring — especially in Erie, PA. Here's what I can help with:\n\nTools:\n• Deal Screener — Quick go/no-go evaluation for any property type\n• Deal Memo — Professional lender-ready deal package\n• 7 Simulators — Pro formas, capital stacks, sources & uses\n• Incentives — 17 programs with checklists\n\nIncentive Programs (17 programs):\n• Federal: HTC, NMTC, Opportunity Zones, LIHTC, SBA 504, EB-5, CDBG, EDA, EPA Brownfields\n• State (PA): LERTA, CRIZ, RACP, KOZ, Keystone Communities, NPP, PA First, PIDA\n\nFinancial Concepts:\n• Cap Rate, NOI, DSCR, IRR, Cash-on-Cash, LTV/LTC\n• Capital stacks, sources & uses, waterfall distributions\n• Pro forma modeling, vacancy, rent projections\n\nDeal Structuring:\n• Gap financing, incentive layering, construction budgeting\n• Lease structures, tenant recruitment, phased development\n\nTry asking: 'How do I layer HTC and NMTC?' or 'What's a good capital stack for a $5M rehab in Erie?' or 'Explain DSCR' or 'How does CRIZ work?'"}
];

function AICoachPage() {
  const [messages, setMessages] = useState([
    {role:'ai', text:"Welcome to the AI Business Coach. I have deep knowledge of 17 incentive programs, capital stack structures, pro forma modeling, and Erie's development finance landscape.\n\nAsk me about any program — HTC, NMTC, Opportunity Zones, LERTA, CRIZ, RACP, LIHTC, SBA 504, and more. Or ask about financial concepts like cap rates, DSCR, NOI, waterfall distributions, or how to close a funding gap.\n\nWhat are you working on?"}
  ]);
  const [input, setInput] = useState('');
  const chatEnd = useRef(null);
  useEffect(() => { chatEnd.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  const findBestMatch = (query) => {
    const lower = query.toLowerCase();

    // Greeting
    if (/^(hi|hey|hello|yo|sup|what'?s up)\b/i.test(lower.trim())) {
      return {title:'Welcome',text:"Hey! I'm the Keystone Stack AI Business Coach. I can explain incentive programs (HTC, NMTC, OZ, LERTA, CRIZ, RACP, LIHTC, and 10 more), financial concepts (cap rate, NOI, DSCR, IRR, capital stacks), and deal structuring strategies.\n\nTry asking something like:\n• \"How do Historic Tax Credits work?\"\n• \"What's CRIZ and why does it matter?\"\n• \"Explain DSCR\"\n• \"How do I close a funding gap?\"\n• \"What incentives work best in Erie?\"\n\nWhat would you like to know?"};
    }

    // Score each KB entry
    let bestScore = 0;
    let bestEntries = [];

    for (const entry of COACH_KB) {
      let score = 0;
      for (const key of entry.keys) {
        if (lower.includes(key)) {
          // Longer key matches are worth more
          score += key.length;
          // Exact word boundary match is worth extra
          const regex = new RegExp('\\b' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
          if (regex.test(lower)) score += key.length;
        }
      }
      if (score > 0) bestEntries.push({entry, score});
    }

    bestEntries.sort((a,b) => b.score - a.score);

    // Multi-topic detection: if user asks about combining/comparing programs
    const combineWords = ['combine','layer','together','pair','stack','both','and','with','versus','vs','compare','difference'];
    const isCombining = combineWords.some(w => lower.includes(w)) && bestEntries.length >= 2;

    if (isCombining && bestEntries.length >= 2) {
      const e1 = bestEntries[0].entry;
      const e2 = bestEntries[1].entry;
      return {
        title: e1.title + ' + ' + e2.title,
        text: `Here's what you need to know about both:\n\n━━ ${e1.title} ━━\n${e1.text}\n\n━━ ${e2.title} ━━\n${e2.text}\n\nLayering tip: These programs can often be combined in a single capital stack. The key is ensuring compliance periods and timelines align. Check the Incentives page for detailed checklists on each program.`
      };
    }

    if (bestEntries.length > 0) {
      return bestEntries[0].entry;
    }

    // Fuzzy fallback: check for partial matches
    const words = lower.split(/\s+/).filter(w => w.length > 3);
    for (const entry of COACH_KB) {
      for (const key of entry.keys) {
        for (const word of words) {
          if (key.includes(word) || word.includes(key)) {
            return entry;
          }
        }
      }
    }

    return null;
  };

  const send = () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setMessages(prev => [...prev, {role:'user', text: userMsg}]);
    setInput('');

    setTimeout(() => {
      const match = findBestMatch(userMsg);
      if (match) {
        setMessages(prev => [...prev, {role:'ai', text: match.text}]);
      } else {
        setMessages(prev => [...prev, {role:'ai', text:"I don't have a specific answer for that, but I can help with:\n\n• 17 Incentive Programs: HTC, NMTC, Opportunity Zones, LIHTC, LERTA, CRIZ, RACP, KOZ, SBA 504, EB-5, CDBG, EDA, EPA Brownfields, Keystone Communities, NPP, PA First, PIDA\n\n• Financial Concepts: Cap rate, NOI, DSCR, IRR, cash-on-cash, LTV/LTC, capital stacks, sources & uses, waterfall distributions, pro forma modeling\n\n• Deal Structuring: Gap financing, incentive layering, construction budgeting, lease structures, tenant recruitment, phased development\n\nTry asking about a specific program or concept!"}]);
      }
    }, 250);
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-header-inner">
          <h1>AI Business Coach</h1>
          <p>Deep knowledge of incentive programs, capital stacks, and development finance</p>
        </div>
      </div>
      <div className="content">
        <div className="chat-container">
          <div className="chat-messages">
            {messages.map((m,i) => (
              <div key={i} className={`chat-msg chat-msg-${m.role}`}>
                <div className="chat-avatar">{m.role === 'ai' ? 'AI' : 'You'}</div>
                <div className="chat-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
              </div>
            ))}
            <div ref={chatEnd}/>
          </div>
          <div className="chat-input-row">
            <input className="input" placeholder="Ask about HTC, NMTC, CRIZ, cap rates, capital stacks..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()}/>
            <button className="btn-gold btn-sm" onClick={send}><Icon type="send" size={16}/></button>
          </div>
        </div>
      </div>
    </div>
  );
}
