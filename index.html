// ─── GLOSSARY ───────────────────────────────────────────────────────────────
function GlossaryPage({setPage}) {
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('All');
  const [expanded, setExpanded] = useState({});
  const cats = ['All','Foundations','Business','Investor','Real Estate','Taxes & Incentives'];
  const filtered = GLOSSARY.filter(g => {
    if (search && !g.term.toLowerCase().includes(search.toLowerCase()) && !g.def.toLowerCase().includes(search.toLowerCase())) return false;
    if (cat !== 'All' && g.cat !== cat) return false;
    return true;
  });
  const grouped = {};
  filtered.forEach(g => {
    const letter = g.term[0].match(/[A-Z]/) ? g.term[0] : g.term[0] === '1' ? '1' : '#';
    if (!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(g);
  });
  const letters = Object.keys(grouped).sort();
  const allLetters = ['1','A','B','C','D','E','F','G','H','I','K','L','M','N','O','P','Q','R','S','T','U','V','W'];
  const catBadgeClass = (c) => {
    const map = {'Foundations':'badge-foundations','Business':'badge-business','Investor':'badge-investor','Real Estate':'badge-realestate','Taxes & Incentives':'badge-taxes'};
    return map[c] || '';
  };
  const toggle = (term) => setExpanded(prev => ({...prev, [term]: !prev[term]}));
  // When searching, auto-expand all results
  const isExpanded = (term) => search.length > 0 || expanded[term];
  return (
    <div>
      <div className="page-header">
        <div className="page-header-inner">
          <div className="back-link" onClick={() => setPage('home')}><Icon type="back" size={16}/> Home</div>
          <h1>Glossary</h1>
          <p>101+ development finance terms in plain language</p>
        </div>
      </div>
      <div className="content">
        <div style={{display:'flex',gap:'0.75rem',flexWrap:'wrap',alignItems:'center',marginBottom:'1rem'}}>
          <input className="input" style={{flex:1,minWidth:200,maxWidth:400}} placeholder="Search terms..." value={search} onChange={e => setSearch(e.target.value)}/>
          <div className="filter-pills">
            {cats.map(c => (
              <button key={c} className={`pill${cat===c?' active':''}`} onClick={() => setCat(c)}>{c}</button>
            ))}
          </div>
        </div>
        <div className="alpha-nav" style={{marginBottom:'1.5rem',marginTop:0}}>
          {allLetters.map(l => (
            <button key={l} className={`alpha-btn${grouped[l] ? '' : ''}`} onClick={() => { const el = document.getElementById('letter-'+l); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }}>{l}</button>
          ))}
        </div>
        <p style={{color:'var(--text-muted)',fontSize:'0.82rem',marginBottom:'1rem'}}>{filtered.length} terms</p>
        {letters.map(letter => (
          <div key={letter} id={'letter-'+letter}>
            <div className="glossary-letter">{letter}</div>
            {grouped[letter].map((g,i) => (
              <div key={i} className={`glossary-item${isExpanded(g.term) ? ' expanded' : ''}`} onClick={() => toggle(g.term)}>
                <div className="glossary-item-header">
                  <h3>{g.term}</h3>
                  <span className={`badge-cat ${catBadgeClass(g.cat)}`}>{g.cat}</span>
                  <span className="glossary-expand">&#9660;</span>
                </div>
                <p>{g.def}</p>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── INCENTIVES with Eligibility Screener ───────────────────────────────────
function IncentivesPage({setPage}) {
  const [search, setSearch] = useState('');
  const [level, setLevel] = useState('all');
  const [type, setType] = useState('all');
  const [projectType, setProjectType] = useState('any');
  const [projectSize, setProjectSize] = useState('any');
  const [location, setLocation] = useState('any');
  const [expandedChecklists, setExpandedChecklists] = useState({});
  const toggleChecklist = (name) => setExpandedChecklists(prev => ({...prev, [name]: !prev[name]}));
  const types = ['all','Grant','Loan','Tax Abatement','Tax Credit','Equity'];
  const screenerActive = projectType !== 'any' || projectSize !== 'any' || location !== 'any';
  const getMatch = (p) => {
    if (!screenerActive) return 0;
    let score = 0;
    // Historic Rehab: HTC, NMTC, OZ, LERTA, RACP, KOZ, Keystone Communities, CRIZ
    if (projectType === 'historic-rehab' && (p.name.includes('Historic') || p.name.includes('LERTA') || p.name.includes('RACP') || p.name.includes('NMTC') || p.name.includes('New Markets') || p.name.includes('Opportunity Zone') || p.name.includes('KOZ') || p.name.includes('Keystone Opportunity') || p.name.includes('Keystone Communities') || p.name.includes('CRIZ'))) score++;
    // New Construction: SBA, PIDA, EDA, TIF, KOZ, Opportunity Zones, CRIZ
    if (projectType === 'new-construction' && (p.name.includes('SBA') || p.name.includes('PIDA') || p.name.includes('EDA') || p.name.includes('TIF') || p.name.includes('KOZ') || p.name.includes('Keystone Opportunity') || p.name.includes('Opportunity Zone') || p.name.includes('CRIZ'))) score++;
    // Mixed-Use: CDBG, OZ, NMTC, KOZ, TIF, Historic, LIHTC, RACP, Keystone Communities, CRIZ
    if (projectType === 'mixed-use' && (p.name.includes('CDBG') || p.name.includes('Opportunity') || p.name.includes('NMTC') || p.name.includes('New Markets') || p.name.includes('KOZ') || p.name.includes('Keystone Opportunity') || p.name.includes('TIF') || p.name.includes('Historic') || p.name.includes('LIHTC') || p.name.includes('Low-Income Housing') || p.name.includes('RACP') || p.name.includes('Keystone Communities') || p.name.includes('CRIZ'))) score++;
    // Affordable Housing: LIHTC, CDBG, OZ, RACP, Neighborhood Partnership, CRIZ
    if (projectType === 'affordable-housing' && (p.name.includes('LIHTC') || p.name.includes('Low-Income Housing') || p.name.includes('CDBG') || p.name.includes('Opportunity') || p.name.includes('RACP') || p.name.includes('Neighborhood Partnership') || p.name.includes('CRIZ'))) score++;
    // Brownfield: EPA, EDA, KOZ, Opportunity Zones, RACP, CRIZ
    if (projectType === 'brownfield' && (p.name.includes('Brownfield') || p.name.includes('EPA') || p.name.includes('EDA') || p.name.includes('KOZ') || p.name.includes('Keystone Opportunity') || p.name.includes('Opportunity Zone') || p.name.includes('RACP') || p.name.includes('CRIZ'))) score++;
    if (projectSize === 'large' && (p.name.includes('NMTC') || p.name.includes('New Markets') || p.name.includes('EB-5') || p.name.includes('RACP') || p.name.includes('EDA') || p.name.includes('CRIZ'))) score++;
    if (projectSize === 'small' && (p.name.includes('SBA') || p.name.includes('LERTA') || p.name.includes('Keystone Communities') || p.name.includes('Neighborhood Partnership'))) score++;
    if (projectSize === 'medium' && (p.name.includes('PIDA') || p.name.includes('Historic') || p.name.includes('CDBG') || p.name.includes('LERTA') || p.name.includes('SBA') || p.name.includes('CRIZ'))) score++;
    if (location === 'erie' && (p.location.includes('Erie') || p.level === 'local')) score++;
    if (location === 'pa' && (p.level === 'state' || p.level === 'local')) score++;
    return score;
  };
  const filtered = INCENTIVES.filter(p => {
    if (search && !p.name.toLowerCase().includes(search.toLowerCase()) && !p.desc.toLowerCase().includes(search.toLowerCase())) return false;
    if (level !== 'all' && p.level !== level) return false;
    if (type !== 'all' && p.type !== type) return false;
    return true;
  }).sort((a,b) => screenerActive ? getMatch(b) - getMatch(a) : 0);
  return (
    <div>
      <div className="page-header">
        <div className="page-header-inner">
          <div className="back-link" onClick={() => setPage('home')}><Icon type="back" size={16}/> Home</div>
          <h1>Incentives &amp; Programs</h1>
          <p>Find federal, state, and local programs for your project</p>
        </div>
      </div>
      <div className="content">
        <div style={{background:'var(--bg-card)',borderRadius:12,padding:'1.5rem',marginBottom:'1.5rem',border:'1px solid var(--border)'}}>
          <div className="screener-row" style={{marginBottom:'1rem'}}>
            <select className="input input-sm" value={projectType} onChange={e=>setProjectType(e.target.value)} aria-label="Project type">
              <option value="any">Any Project Type</option>
              <option value="historic-rehab">Historic Rehabilitation</option>
              <option value="new-construction">New Construction</option>
              <option value="mixed-use">Mixed-Use Development</option>
              <option value="affordable-housing">Affordable Housing</option>
              <option value="brownfield">Brownfield Redevelopment</option>
            </select>
            <select className="input input-sm" value={projectSize} onChange={e=>setProjectSize(e.target.value)} aria-label="Project size">
              <option value="any">Any Size</option>
              <option value="small">Small (Under $500K)</option>
              <option value="medium">Medium ($500K\u2013$5M)</option>
              <option value="large">Large ($5M+)</option>
            </select>
            <select className="input input-sm" value={location} onChange={e=>setLocation(e.target.value)} aria-label="Project location">
              <option value="any">Any Location</option>
              <option value="erie">Erie, PA</option>
              <option value="pa">Pennsylvania (other)</option>
              <option value="national">National</option>
            </select>
          </div>
          <div style={{display:'flex',gap:'0.75rem',flexWrap:'wrap',alignItems:'center'}}>
            <input className="input input-sm" style={{flex:1,minWidth:200}} placeholder="Search programs..." value={search} onChange={e => setSearch(e.target.value)}/>
            <div className="filter-pills">
              {['all','local','state','federal'].map(l => (
                <button key={l} className={`pill${level===l?' active':''}`} onClick={() => setLevel(l)}>{l === 'all' ? 'All' : l.charAt(0).toUpperCase()+l.slice(1)}</button>
              ))}
            </div>
            <select className="input input-sm" style={{width:'auto',minWidth:130}} value={type} onChange={e => setType(e.target.value)} aria-label="Filter by type">
              {types.map(t => <option key={t} value={t}>{t === 'all' ? 'All Types' : t}</option>)}
            </select>
            {screenerActive && <button className="btn-preset" onClick={()=>{setProjectType('any');setProjectSize('any');setLocation('any');}}>Clear</button>}
          </div>
        </div>
        <p style={{color:'var(--text-muted)',fontSize:'0.82rem',marginBottom:'1rem'}}>{filtered.length} programs{screenerActive ? ' — matching programs highlighted' : ''}</p>
        <div className="incentive-grid">
          {filtered.map((p,i) => {
            const match = getMatch(p);
            return (
              <div key={i} className={`incentive-card${screenerActive && match > 0 ? ' highlighted' : ''}${screenerActive && match === 0 ? ' dimmed' : ''}`}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'0.5rem',marginBottom:'0.35rem'}}>
                  <h3>{p.name}{match > 0 && <span className="match-badge">Match</span>}</h3>
                  <span className={`badge badge-${p.level}`}>{p.level}</span>
                </div>
                <div className="location"><Icon type="pin" size={14}/> {p.location}</div>
                <p className="desc">{p.desc}</p>
                <div className="incentive-tags">
                  {p.tags.map((t,j) => <span key={j} className="incentive-tag">{t}</span>)}
                </div>
                {p.prevailingWage && <div className="pw-badge"><Icon type="warn" size={12}/> Davis-Bacon / Prevailing Wage Required</div>}
                <div style={{display:'flex',gap:'0.75rem',alignItems:'center',marginTop:'0.5rem'}}>
                  {p.url && <a href={p.url} target="_blank" rel="noopener noreferrer" className="official-link">Official Source <Icon type="link" size={12}/></a>}
                  {p.checklist && <button className="checklist-toggle" onClick={(e) => {e.stopPropagation(); toggleChecklist(p.name);}}>{expandedChecklists[p.name] ? 'Hide' : 'Show'} Checklist ({p.checklist.length})</button>}
                </div>
                {p.checklist && expandedChecklists[p.name] && (
                  <div className="checklist-panel">
                    {p.checklist.map((item, ci) => (
                      <div key={ci} className="checklist-item">
                        <div className="check-box"></div>
                        <span>{item}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="disclaimer" style={{marginTop:'1.5rem'}}>
          <div className="disclaimer-icon"><Icon type="warn" size={18}/></div>
          <div>
            <h4>Educational Disclaimer</h4>
            <p>This tool is for educational purposes only and does not constitute financial, legal, or tax advice. Always consult qualified professionals and verify program eligibility with official sources before making decisions.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DEAL MEMO GENERATOR ────────────────────────────────────────────────────
function DealMemoPage({setPage}) {
  const [step, setStep] = useState(1);
  const [memo, setMemo] = useState({
    projectName:'',address:'',city:'Erie',state:'PA',
    projectType:'historic-rehab',projectDesc:'',
    acquisitionCost:0,hardCosts:0,softCosts:0,financingCosts:0,contingency:0,
    seniorDebt:0,seniorRate:6.5,seniorTerm:25,
    mezzDebt:0,mezzRate:12,
    taxCreditEquity:0,grantFunds:0,ownerEquity:0,
    grossRent:0,vacancyRate:10,monthlyOpex:0,
    totalSF:0,units:0,
    jobsCreated:0,jobsRetained:0,
    communityImpact:'',timeline:'12 months',
    contactName:'',contactTitle:'',contactOrg:'',contactEmail:'',contactPhone:''
  });
  const set = (k,val) => setMemo({...memo,[k]:val});
  // Calculated values
  const totalUses = memo.acquisitionCost + memo.hardCosts + memo.softCosts + memo.financingCosts + memo.contingency;
  const totalSources = memo.seniorDebt + memo.mezzDebt + memo.taxCreditEquity + memo.grantFunds + memo.ownerEquity;
  const gap = totalUses - totalSources;
  const annualRent = memo.grossRent * 12;
  const egi = annualRent * (1 - memo.vacancyRate/100);
  const annualOpex = memo.monthlyOpex * 12;
  const noi = egi - annualOpex;
  const seniorDS = memo.seniorDebt > 0 && memo.seniorRate > 0 ? pmt(memo.seniorRate/100/12, memo.seniorTerm*12, memo.seniorDebt) * 12 : 0;
  const mezzDS = memo.mezzDebt > 0 ? memo.mezzDebt * memo.mezzRate/100 : 0;
  const totalDS = seniorDS + mezzDS;
  const dscr = totalDS > 0 ? noi / totalDS : Infinity;
  const cashFlow = noi - totalDS;
  const capRate = totalUses > 0 ? (noi / totalUses * 100) : 0;
  const ltc = totalUses > 0 ? (memo.seniorDebt / totalUses * 100) : 0;
  const projectTypes = {'historic-rehab':'Historic Rehabilitation','new-construction':'New Construction','mixed-use':'Mixed-Use Development','affordable-housing':'Affordable Housing','brownfield':'Brownfield Redevelopment'};

  const exportMemoPDF = () => {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    // Header
    doc.setFillColor(15,6,32); doc.rect(0,0,210,32,'F');
    doc.setFillColor(212,175,55); doc.rect(0,32,210,1.5,'F');
    drawKeystoneLogo(doc, 14, 5, 1.1);
    doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(212,175,55);
    doc.text('KEYSTONE STACK', 34, 14);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(200,180,140);
    doc.text('DEAL SUMMARY MEMO', 34, 21);
    doc.setFontSize(7); doc.setTextColor(160,140,100);
    doc.text(new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}), 190, 14, {align:'right'});
    doc.text('CONFIDENTIAL', 190, 20, {align:'right'});
    // Project Title
    let y = 40;
    doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
    doc.text(memo.projectName || 'Untitled Project', 20, y); y += 5;
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100);
    doc.text((memo.address ? memo.address + ', ' : '') + memo.city + ', ' + memo.state + ' | ' + (projectTypes[memo.projectType]||'Development'), 20, y); y += 8;
    // Description
    if (memo.projectDesc) {
      doc.setFontSize(8.5); doc.setTextColor(60);
      const descLines = doc.splitTextToSize(memo.projectDesc, 170);
      doc.text(descLines, 20, y); y += descLines.length * 4 + 4;
    }
    // Key Metrics row

    const metrics = [

      {label:'DSCR',val:dscr===Infinity?'N/A':dscr.toFixed(2)+'x'},

    metrics.forEach((m,i) => {

      doc.setDrawColor(220); doc.line(20, y, 190, y); y += 4;
      doc.setFont('helvetica','normal'); doc.setTextColor(60);
      if (memo.jobsCreated > 0) { doc.text('Jobs Created: ' + memo.jobsCreated, 24, y); y += 4; }
      if (memo.jobsRetained > 0) { doc.text('Jobs Retained: ' + memo.jobsRetained, 24, y); y += 4; }
      if (memo.totalSF > 0) { doc.text('Total Square Footage: ' + memo.totalSF.toLocaleString() + ' SF', 24, y); y += 4; }
      if (memo.units > 0) { doc.text('Residential Units: ' + memo.units, 24, y); y += 4; }
      if (memo.communityImpact) {
        const ciLines = doc.splitTextToSize(memo.communityImpact, 165);
        doc.text(ciLines, 24, y); y += ciLines.length * 4;
      }
      y += 2;
    }
    // Timeline & Contact
    doc.setFont('helvetica','bold'); doc.setTextColor(184,158,42);
    doc.text('PROJECT TIMELINE & CONTACT', 20, y); y += 1;
    doc.setDrawColor(220); doc.line(20, y, 190, y); y += 4;
    doc.setFont('helvetica','normal'); doc.setTextColor(60);
    doc.text('Estimated Timeline: ' + memo.timeline, 24, y); y += 4;
    if (memo.contactName) { doc.text(memo.contactName + (memo.contactTitle ? ', ' + memo.contactTitle : ''), 24, y); y += 4; }
    if (memo.contactOrg) { doc.text(memo.contactOrg, 24, y); y += 4; }
    if (memo.contactEmail) { doc.text(memo.contactEmail + (memo.contactPhone ? ' | ' + memo.contactPhone : ''), 24, y); y += 4; }
    // Footer
    const pageCount = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFillColor(15,6,32); doc.rect(0,282,210,15,'F');
      doc.setFontSize(6.5); doc.setTextColor(180,160,120);
      doc.text('Keystone Stack \u2014 This deal memo is for planning purposes only and does not constitute financial, legal, or tax advice.', 20, 288);
      doc.text('Page '+i+' of '+pageCount, 190, 288, {align:'right'});
    }
    doc.save((memo.projectName || 'deal-memo').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-deal-memo.pdf');
  };

  // ── EXCEL PRO FORMA EXPORT ──────────────────────────────────────────────
  const exportMemoExcel = () => {
    const wb = XLSX.utils.book_new();
    const money = '$#,##0;($#,##0);"-"';
    const pctFmt = '0.0%';
    const dec2 = '0.00';
    const hasMezz = memo.mezzDebt > 0;

    // Helper: set cell value + optional format on a worksheet
    const setCell = (ws, ref, val, z) => {
      if (typeof val === 'object' && val !== null && val.f) {
        ws[ref] = {t:'n', f:val.f};
      } else if (typeof val === 'number') {
        ws[ref] = {t:'n', v:val};
      } else {
        ws[ref] = {t:'s', v:String(val||'')};
      }
      if (z && ws[ref]) ws[ref].z = z;
    };

    // ════════════════ SHEET 1: DEAL SUMMARY ════════════════
    const s1d = [];
    const R1 = (vals) => { s1d.push(vals); return s1d.length; };
    R1(['KEYSTONE STACK — DEAL SUMMARY PRO FORMA']);
    R1(['Generated', new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})]);
    R1([]);
    R1(['PROJECT INFORMATION']);
    R1(['Project Name', memo.projectName || 'Untitled Project']);
    R1(['Address', (memo.address ? memo.address+', ':'')+memo.city+', '+memo.state]);
    R1(['Project Type', projectTypes[memo.projectType]||'Development']);
    R1(['Estimated Timeline', memo.timeline]);
    if (memo.projectDesc) R1(['Description', memo.projectDesc]);
    R1([]);
    // Uses
    R1(['USES OF FUNDS','Amount']);
    const u0 = s1d.length + 1;
    R1(['Acquisition / Land', memo.acquisitionCost]);
    R1(['Hard Costs', memo.hardCosts]);
    R1(['Soft Costs', memo.softCosts]);
    R1(['Financing Costs', memo.financingCosts]);
    R1(['Contingency', memo.contingency]);
    const u1 = s1d.length;
    R1(['Total Uses', null]);
    const uTotR = s1d.length;
    R1([]);
    // Sources
    R1(['SOURCES OF FUNDS','Amount']);
    const sr0 = s1d.length + 1;
    R1(['Senior Debt', memo.seniorDebt]);
    if (hasMezz) R1(['Mezzanine Debt', memo.mezzDebt]);
    if (memo.taxCreditEquity>0) R1(['Tax Credit Equity', memo.taxCreditEquity]);
    if (memo.grantFunds>0) R1(['Grant Funds', memo.grantFunds]);
    R1(['Owner / Sponsor Equity', memo.ownerEquity]);
    const sr1 = s1d.length;
    R1(['Total Sources', null]);
    const sTotR = s1d.length;
    R1(['Funding Gap / (Surplus)', null]);
    const gapR = s1d.length;
    R1([]);
    // Key Metrics (formula-driven from this sheet)
    R1(['KEY METRICS']);
    R1(['NOI (from Pro Forma)', noi]);
    const noiMetricR = s1d.length;
    R1(['Cap Rate', null]);
    const capMetricR = s1d.length;
    R1(['DSCR', dscr===Infinity?'N/A':dscr]);
    const dscrMetricR = s1d.length;
    R1(['Loan-to-Cost', null]);
    const ltcMetricR = s1d.length;
    R1([]);
    // Contact
    R1(['CONTACT INFORMATION']);
    if (memo.contactName) R1(['Name', memo.contactName+(memo.contactTitle?', '+memo.contactTitle:'')]);
    if (memo.contactOrg) R1(['Organization', memo.contactOrg]);
    if (memo.contactEmail) R1(['Email', memo.contactEmail]);
    if (memo.contactPhone) R1(['Phone', memo.contactPhone]);

    const ws1 = XLSX.utils.aoa_to_sheet(s1d);
    ws1['!cols'] = [{wch:30},{wch:24}];
    // Inject formulas
    setCell(ws1,'B'+uTotR,{f:'SUM(B'+u0+':B'+u1+')'},money);
    setCell(ws1,'B'+sTotR,{f:'SUM(B'+sr0+':B'+sr1+')'},money);
    setCell(ws1,'B'+gapR,{f:'B'+uTotR+'-B'+sTotR},money);
    setCell(ws1,'B'+capMetricR,{f:'IF(B'+uTotR+'=0,0,B'+noiMetricR+'/B'+uTotR+')'},pctFmt);
    setCell(ws1,'B'+ltcMetricR,{f:'IF(B'+uTotR+'=0,0,B'+sr0+'/B'+uTotR+')'},pctFmt);
    // Format money cells in Uses
    for(let r=u0;r<=u1;r++) if(ws1['B'+r]) ws1['B'+r].z=money;
    // Format money cells in Sources
    for(let r=sr0;r<=sr1;r++) if(ws1['B'+r]) ws1['B'+r].z=money;
    // Format NOI & DSCR
    if(ws1['B'+noiMetricR]) ws1['B'+noiMetricR].z=money;
    if(ws1['B'+dscrMetricR] && typeof ws1['B'+dscrMetricR].v==='number') ws1['B'+dscrMetricR].z=dec2;

    // ════════════════ SHEET 2: OPERATING PRO FORMA (FORMULA-DRIVEN) ════════════════
    // Layout: Assumptions at top (editable inputs), Pro Forma below with formulas
    const ws2 = {};
    ws2['!ref'] = 'A1:C40';
    ws2['!cols'] = [{wch:34},{wch:20},{wch:20}];
    let r2 = 1;

    // ── ASSUMPTIONS SECTION (editable blue inputs)
    setCell(ws2,'A'+r2,'ASSUMPTIONS — EDIT THESE VALUES'); r2++;
    setCell(ws2,'A'+r2,'(Change any value below and the pro forma recalculates)'); r2++;
    r2++;
    setCell(ws2,'A'+r2,'Monthly Rent (all units)'); setCell(ws2,'B'+r2,memo.grossRent,money);
    const rentCell = 'B'+r2; r2++;
    setCell(ws2,'A'+r2,'Vacancy Rate'); setCell(ws2,'B'+r2,memo.vacancyRate/100,pctFmt);
    const vacCell = 'B'+r2; r2++;
    setCell(ws2,'A'+r2,'Monthly Operating Expenses'); setCell(ws2,'B'+r2,memo.monthlyOpex,money);
    const opexCell = 'B'+r2; r2++;
    r2++;
    setCell(ws2,'A'+r2,'Senior Debt Amount'); setCell(ws2,'B'+r2,memo.seniorDebt,money);
    const sdAmtCell = 'B'+r2; r2++;
    setCell(ws2,'A'+r2,'Senior Interest Rate'); setCell(ws2,'B'+r2,memo.seniorRate/100,pctFmt);
    const sdRateCell = 'B'+r2; r2++;
    setCell(ws2,'A'+r2,'Senior Term (years)'); setCell(ws2,'B'+r2,memo.seniorTerm,'0');
    const sdTermCell = 'B'+r2; r2++;
    if (hasMezz) {
      setCell(ws2,'A'+r2,'Mezzanine Debt Amount'); setCell(ws2,'B'+r2,memo.mezzDebt,money);
      var mzAmtCell = 'B'+r2; r2++;
      setCell(ws2,'A'+r2,'Mezzanine Rate (interest-only)'); setCell(ws2,'B'+r2,memo.mezzRate/100,pctFmt);
      var mzRateCell = 'B'+r2; r2++;
    }
    if (memo.totalSF > 0) {
      setCell(ws2,'A'+r2,'Total Square Footage'); setCell(ws2,'B'+r2,memo.totalSF,'#,##0');
      r2++;
    }
    if (memo.units > 0) {
      setCell(ws2,'A'+r2,'Residential Units'); setCell(ws2,'B'+r2,memo.units,'0');
      r2++;
    }

    r2 += 2;
    // ── PRO FORMA SECTION (all formulas)
    setCell(ws2,'A'+r2,'OPERATING PRO FORMA — YEAR 1');
    setCell(ws2,'B'+r2,'Annual'); setCell(ws2,'C'+r2,'Monthly'); r2++;
    setCell(ws2,'A'+r2,memo.projectName||'Untitled Project'); r2++;
    r2++;

    // REVENUE
    setCell(ws2,'A'+r2,'REVENUE'); r2++;
    setCell(ws2,'A'+r2,'Gross Potential Rent');
    setCell(ws2,'B'+r2,{f:rentCell+'*12'},money);
    setCell(ws2,'C'+r2,{f:rentCell},money);
    const gprR = r2; r2++;

    setCell(ws2,'A'+r2,'Less: Vacancy');
    setCell(ws2,'B'+r2,{f:'-B'+gprR+'*'+vacCell},money);
    setCell(ws2,'C'+r2,{f:'-C'+gprR+'*'+vacCell},money);
    const vacR = r2; r2++;

    setCell(ws2,'A'+r2,'Effective Gross Income');
    setCell(ws2,'B'+r2,{f:'B'+gprR+'+B'+vacR},money);
    setCell(ws2,'C'+r2,{f:'C'+gprR+'+C'+vacR},money);
    const egiR = r2; r2++;
    r2++;

    // EXPENSES
    setCell(ws2,'A'+r2,'EXPENSES'); r2++;
    setCell(ws2,'A'+r2,'Operating Expenses');
    setCell(ws2,'B'+r2,{f:'-'+opexCell+'*12'},money);
    setCell(ws2,'C'+r2,{f:'-'+opexCell},money);
    const opexR = r2; r2++;

    setCell(ws2,'A'+r2,'Net Operating Income (NOI)');
    setCell(ws2,'B'+r2,{f:'B'+egiR+'+B'+opexR},money);
    setCell(ws2,'C'+r2,{f:'C'+egiR+'+C'+opexR},money);
    const noiR = r2; r2++;
    r2++;

    // DEBT SERVICE
    setCell(ws2,'A'+r2,'DEBT SERVICE'); r2++;
    // Senior DS: =PMT(rate/12, term*12, -amount)*12  (annual)
    setCell(ws2,'A'+r2,'Senior Debt Service');
    setCell(ws2,'B'+r2,{f:'-IF('+sdAmtCell+'=0,0,PMT('+sdRateCell+'/12,'+sdTermCell+'*12,-'+sdAmtCell+'))*12'},money);
    setCell(ws2,'C'+r2,{f:'B'+r2+'/12'},money);
    const senDsR = r2; r2++;

    let totDsFormula = '-B'+senDsR;
    let totDsMonthly = '-C'+senDsR;
    if (hasMezz) {
      setCell(ws2,'A'+r2,'Mezzanine Interest');
      setCell(ws2,'B'+r2,{f:'-'+mzAmtCell+'*'+mzRateCell},money);
      setCell(ws2,'C'+r2,{f:'B'+r2+'/12'},money);
      const mzDsR = r2;
      totDsFormula += '-B'+mzDsR;
      totDsMonthly += '-C'+mzDsR;
      r2++;
    }

    setCell(ws2,'A'+r2,'Total Debt Service');
    setCell(ws2,'B'+r2,{f:totDsFormula},money);
    setCell(ws2,'C'+r2,{f:totDsMonthly},money);
    const totDsR = r2; r2++;
    r2++;

    // CASH FLOW
    setCell(ws2,'A'+r2,'CASH FLOW'); r2++;
    setCell(ws2,'A'+r2,'Cash Flow After Debt Service');
    setCell(ws2,'B'+r2,{f:'B'+noiR+'+B'+totDsR},money);
    setCell(ws2,'C'+r2,{f:'C'+noiR+'+C'+totDsR},money);
    r2 += 2;

    // KEY RATIOS (formula-driven)
    setCell(ws2,'A'+r2,'KEY RATIOS (auto-calculated)'); r2++;
    setCell(ws2,'A'+r2,'Cap Rate');
    setCell(ws2,'B'+r2,{f:'IF(\'Deal Summary\'!B'+uTotR+'=0,0,B'+noiR+'/\'Deal Summary\'!B'+uTotR+')'},pctFmt);
    r2++;
    setCell(ws2,'A'+r2,'DSCR');
    setCell(ws2,'B'+r2,{f:'IF(B'+totDsR+'=0,0,B'+noiR+'/ABS(B'+totDsR+'))'},dec2);
    r2++;
    setCell(ws2,'A'+r2,'Cash-on-Cash Return');
    setCell(ws2,'B'+r2,{f:'IF(\'Deal Summary\'!B'+sr1+'=0,0,(B'+noiR+'+B'+totDsR+')/\'Deal Summary\'!B'+sr1+')'},pctFmt);
    r2++;

    // Update sheet ref
    ws2['!ref'] = 'A1:C'+r2;

    // ════════════════ SHEET 3: COMMUNITY IMPACT ════════════════
    const s3 = [];
    const R3 = (vals) => { s3.push(vals); };
    R3(['COMMUNITY IMPACT']);
    R3([memo.projectName || 'Untitled Project']);
    R3([]);
    R3(['Jobs Created', memo.jobsCreated || 0]);
    R3(['Jobs Retained', memo.jobsRetained || 0]);
    if (memo.totalSF > 0) R3(['Total Square Footage', memo.totalSF]);
    if (memo.units > 0) R3(['Residential Units', memo.units]);
    R3([]);
    R3(['Community Impact Statement']);
    R3([memo.communityImpact || '']);

    const ws3 = XLSX.utils.aoa_to_sheet(s3);
    ws3['!cols'] = [{wch:28},{wch:40}];

    // Add sheets
    XLSX.utils.book_append_sheet(wb, ws1, 'Deal Summary');
    XLSX.utils.book_append_sheet(wb, ws2, 'Operating Pro Forma');
    XLSX.utils.book_append_sheet(wb, ws3, 'Community Impact');

    XLSX.writeFile(wb, (memo.projectName||'deal-memo').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-pro-forma.xlsx');
  };

  const StepNav = () => (
    <div className="step-indicator">
      {[{n:1,l:'Project'},{n:2,l:'Capital'},{n:3,l:'Operations'},{n:4,l:'Impact'},{n:5,l:'Review'}].map((s,i) => (
        <React.Fragment key={s.n}>
          {i > 0 && <div className={`step-line${step > s.n-1 ? ' completed' : ''}`}/>}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div className={`step-dot ${step === s.n ? 'active' : step > s.n ? 'completed' : 'pending'}`} onClick={() => setStep(s.n)} style={{cursor:'pointer'}}>
              {step > s.n ? '\u2713' : s.n}
            </div>
            <div className="step-label">{s.l}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );

  return (
    <div>
      <div className="page-header">
        <div className="page-header-inner">
          <div className="back-link" onClick={() => setPage('home')}><Icon type="back" size={16}/> Home</div>
          <h1>Deal Summary Memo</h1>
          <p>Generate a professional one-page deal memo for lenders, investors, and funding applications</p>
        </div>
      </div>
      <div className="content">
        <StepNav/>

        {step === 1 && (
          <div className="memo-section" style={{maxWidth:700,margin:'0 auto'}}>
            <div className="memo-section-title"><Icon type="layers" size={16}/> Project Information</div>
            <div className="input-group">
              <label className="input-label">Project Name</label>
              <input className="input input-sm" type="text" value={memo.projectName} onChange={e=>set('projectName',e.target.value)} placeholder="e.g., 10th & State Mixed-Use Development"/>
            </div>
            <div className="input-group">
              <label className="input-label">Address</label>
              <input className="input input-sm" type="text" value={memo.address} onChange={e=>set('address',e.target.value)} placeholder="e.g., 1001 State Street"/>
            </div>
            <div style={{display:'flex',gap:'0.75rem'}}>
              <div className="input-group" style={{flex:1}}>
                <label className="input-label">City</label>
                <input className="input input-sm" type="text" value={memo.city} onChange={e=>set('city',e.target.value)}/>
              </div>
              <div className="input-group" style={{width:80}}>
                <label className="input-label">State</label>
                <input className="input input-sm" type="text" value={memo.state} onChange={e=>set('state',e.target.value)}/>
              </div>
            </div>
            <div className="input-group">
              <label className="input-label">Project Type</label>
              <select className="input input-sm" value={memo.projectType} onChange={e=>set('projectType',e.target.value)}>
                {Object.entries(projectTypes).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="input-group">
              <label className="input-label">Project Description</label>
              <textarea className="input" style={{minHeight:80,resize:'vertical'}} value={memo.projectDesc} onChange={e=>set('projectDesc',e.target.value)} placeholder="Brief description of the project scope, vision, and strategic significance..."/>
            </div>
            <button className="btn-gold" style={{width:'100%',marginTop:'1rem'}} onClick={()=>setStep(2)}>Next: Capital Stack <Icon type="arrow" size={14}/></button>
          </div>
        )}

        {step === 2 && (
          <div className="memo-form">
            <div className="memo-section">
              <div className="memo-section-title">Uses of Funds</div>
              <NumInput label="Acquisition/Land Cost" value={memo.acquisitionCost} onChange={val=>set('acquisitionCost',val)}/>
              <NumInput label="Hard Costs (Construction)" value={memo.hardCosts} onChange={val=>set('hardCosts',val)}/>
              <NumInput label="Soft Costs (A&E, Legal)" value={memo.softCosts} onChange={val=>set('softCosts',val)}/>
              <NumInput label="Financing Costs" value={memo.financingCosts} onChange={val=>set('financingCosts',val)} step={5000}/>
              <NumInput label="Contingency" value={memo.contingency} onChange={val=>set('contingency',val)} step={5000}/>
              <ResultRow label="Total Uses" value={fmt(totalUses)}/>
            </div>
            <div className="memo-section">
              <div className="memo-section-title">Sources of Funds</div>
              <NumInput label="Senior Debt" value={memo.seniorDebt} onChange={val=>set('seniorDebt',val)}/>
              <NumInput label="Senior Rate" value={memo.seniorRate} onChange={val=>set('seniorRate',val)} prefix="" suffix="%" step={0.25}/>
              <NumInput label="Senior Term" value={memo.seniorTerm} onChange={val=>set('seniorTerm',val)} prefix="" suffix="yrs" step={5}/>
              <NumInput label="Mezzanine Debt" value={memo.mezzDebt} onChange={val=>set('mezzDebt',val)} step={50000}/>
              {memo.mezzDebt > 0 && <NumInput label="Mezz Rate" value={memo.mezzRate} onChange={val=>set('mezzRate',val)} prefix="" suffix="%" step={0.5}/>}
              <NumInput label="Tax Credit Equity" value={memo.taxCreditEquity} onChange={val=>set('taxCreditEquity',val)} step={50000}/>
              <NumInput label="Grant Funds" value={memo.grantFunds} onChange={val=>set('grantFunds',val)} step={50000}/>
              <NumInput label="Owner/Sponsor Equity" value={memo.ownerEquity} onChange={val=>set('ownerEquity',val)} step={25000}/>
              <ResultRow label="Total Sources" value={fmt(totalSources)}/>
              {gap !== 0 && <ResultRow label={gap>0?'Funding Gap':'Surplus'} value={fmt(Math.abs(gap))} className={gap>0?'result-bad':'result-good'}/>}
            </div>
            <div style={{gridColumn:'1/-1',display:'flex',gap:'0.75rem'}}>
              <button className="btn-outline btn-sm" onClick={()=>setStep(1)}><Icon type="back" size={14}/> Back</button>
              <button className="btn-gold" style={{flex:1}} onClick={()=>setStep(3)}>Next: Operations <Icon type="arrow" size={14}/></button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="memo-section" style={{maxWidth:700,margin:'0 auto'}}>
            <div className="memo-section-title"><Icon type="layers" size={16}/> Operating Pro Forma</div>
            <NumInput label="Monthly Gross Rent" value={memo.grossRent} onChange={val=>set('grossRent',val)} step={500} hint="Total scheduled rent at full occupancy"/>
            <NumInput label="Vacancy Rate" value={memo.vacancyRate} onChange={val=>set('vacancyRate',val)} prefix="" suffix="%" step={1}/>
            <NumInput label="Monthly Operating Expenses" value={memo.monthlyOpex} onChange={val=>set('monthlyOpex',val)} step={250} hint="Taxes, insurance, maintenance, management"/>
            <div style={{marginTop:'1rem'}}>
              <div className="result-section-title">Year 1 Pro Forma</div>
              <ResultRow label="Gross Potential Rent" value={fmt(annualRent)}/>
              <ResultRow label={'Vacancy Loss ('+memo.vacancyRate+'%)'} value={fmt(annualRent - egi)}/>
              <ResultRow label="Effective Gross Income" value={fmt(egi)}/>
              <ResultRow label="Operating Expenses" value={fmt(annualOpex)}/>
              <ResultRow label="Net Operating Income" value={fmt(noi)} className={noi>0?'result-good':'result-bad'}/>
              <ResultRow label="Total Debt Service" value={fmt(totalDS)}/>
              <ResultRow label="Cash Flow After DS" value={fmt(cashFlow)} className={cashFlow>0?'result-good':'result-bad'}/>
              <ResultRow label="DSCR" value={dscr===Infinity?'N/A':dscr.toFixed(2)+'x'} className={dscr>=1.25?'result-good':dscr>=1?'result-warn':'result-bad'}/>
              <ResultRow label="Going-In Cap Rate" value={fmtPct(capRate)} className={capRate>6?'result-good':'result-warn'}/>
              <ResultRow label="Senior LTC" value={fmtPct(ltc)} className={ltc<=75?'result-good':'result-warn'}/>
            </div>
            <div style={{display:'flex',gap:'0.75rem',marginTop:'1rem'}}>
              <button className="btn-outline btn-sm" onClick={()=>setStep(2)}><Icon type="back" size={14}/> Back</button>
              <button className="btn-gold" style={{flex:1}} onClick={()=>setStep(4)}>Next: Community Impact <Icon type="arrow" size={14}/></button>
            </div>
          </div>
        )}

        {step === 4 && (
          <div className="memo-section" style={{maxWidth:700,margin:'0 auto'}}>
            <div className="memo-section-title"><Icon type="flag" size={16}/> Community Impact & Contact</div>
            <NumInput label="Total Square Footage" value={memo.totalSF} onChange={val=>set('totalSF',val)} prefix="" suffix="SF" step={500}/>
            <NumInput label="Residential Units" value={memo.units} onChange={val=>set('units',val)} prefix="" suffix="" step={1}/>
            <NumInput label="Jobs Created" value={memo.jobsCreated} onChange={val=>set('jobsCreated',val)} prefix="" suffix="" step={1}/>
            <NumInput label="Jobs Retained" value={memo.jobsRetained} onChange={val=>set('jobsRetained',val)} prefix="" suffix="" step={1}/>
            <div className="input-group">
              <label className="input-label">Community Impact Narrative</label>
